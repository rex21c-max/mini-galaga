<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mini Galaxia</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#020617;touch-action:none;}
canvas{display:block;background:#020617;}
#ui{position:fixed;top:10px;left:10px;color:#e0f2fe;font:16px sans-serif;text-shadow:0 0 8px #38bdf8;z-index:2}
#title{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#020617;z-index:10}
#title h1{font-size:46px;color:#38bdf8;text-shadow:0 0 20px #38bdf8;animation:float 2s infinite}
#title p{color:white;font-size:18px;animation:blink 1s infinite}
#warning{position:fixed;top:32%;left:0;right:0;text-align:center;color:#facc15;font:42px sans-serif;font-weight:bold;text-shadow:0 0 18px #ef4444;z-index:4;display:none}
#msg{position:fixed;top:42%;left:0;right:0;text-align:center;color:white;font:26px sans-serif;text-shadow:0 0 12px #60a5fa;z-index:5;display:none}
#msg button{margin:14px 7px 0;padding:11px 18px;border:1px solid #7dd3fc;background:rgba(15,23,42,.9);color:#e0f2fe;font:bold 14px sans-serif;box-shadow:0 0 14px rgba(56,189,248,.55);cursor:pointer}
#msg button:active{transform:translateY(1px);background:#0f172a}
@keyframes blink{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-10px)}100%{transform:translateY(0)}}
</style>
</head>

<body>
<div id="title">
  <h1>MINI GALAXIA</h1>
  <p>TAP TO START</p>
</div>

<div id="ui">
Score: <span id="score">0</span> /
Life: <span id="life">3</span> /
Best: <span id="best">0</span> /
Shot: <span id="shot">1</span>
</div>

<div id="warning">WARNING</div>
<div id="msg"></div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const title=document.getElementById("title");
const warningEl=document.getElementById("warning");
const msg=document.getElementById("msg");
const scoreEl=document.getElementById("score");
const lifeEl=document.getElementById("life");
const bestEl=document.getElementById("best");
const shotEl=document.getElementById("shot");

let W,H;
let player,bullets,enemies,enemyBullets,items,booms,stars,trail,shockwaves;
let score,life,best,shotLevel,state,startTime,enemySpeed,nextBossAt,bossCount,lastShot,lastDifficultyAt,invincibleUntil;
let weaponMode="normal";
let shake=0;
let bgIndex=0;
let stageIndex=0;
let stagePhase=0;

let difficultyPhase=0;
let phaseStartTime=0;
let musicMode=0;
let audioCtx=null;
let musicTimer=null;
let musicStep=0;

let hitStopUntil=0;
let damageFlash=0;
let playerHitInvincibleUntil=0;
let bossIntro=0;
let bossRage=false;
let bossClearUntil=0;
let clearBanner=null;
let bossEntrance=null;

const START_ENEMY_SPEED=.9;
const MAX_ENEMY_SPEED=2.6;
const BG_NAMES=["Space","Moon","Earth","Desert"];
const STAGES=[
  {
    title:"Viral Cosmos",
    warning:"VIRAL COSMOS",
    from:"Space",
    earth:"City",
    minionStage:0,
    bossStage:0,
    boss:"VOID CARRIER"
  },
  {
    title:"Drone Skyfall",
    warning:"DRONE SKYFALL",
    from:"Orbit",
    earth:"Earth Sky",
    minionStage:2,
    bossStage:2,
    boss:"STORM FORTRESS"
  },
  {
    title:"Moonlit Maw",
    warning:"MOONLIT MAW",
    from:"Moon",
    earth:"Night Sky",
    minionStage:1,
    bossStage:1,
    boss:"LUNAR MAW"
  },
  {
    title:"Solar Scorpion",
    warning:"SOLAR SCORPION",
    from:"Solar Zone",
    earth:"Desert",
    minionStage:3,
    bossStage:3,
    boss:"DUNE SCORPION"
  }
];
const BOSS_NAMES=STAGES.map(s=>s.boss);

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
  makeStars();
}
addEventListener("resize",resize);
resize();

function makeStars(){
  stars=[];
  for(let i=0;i<120;i++){
    stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+.5,s:Math.random()*1.5+.4});
  }
}

function resetVars(){
  player={x:W/2,y:H-80,w:38,h:48};
  bullets=[];
  enemies=[];
  enemyBullets=[];
  items=[];
  booms=[];
  trail=[];
  shockwaves=[];
  score=0;
  life=3;
  shotLevel=1;
  weaponMode="normal";
  enemySpeed=START_ENEMY_SPEED;
  nextBossAt=30000;
  bossCount=0;
  lastShot=0;
  lastDifficultyAt=0;
  invincibleUntil=0;
  playerHitInvincibleUntil=0;
  bossIntro=0;
  bossRage=false;
  bossClearUntil=0;
  clearBanner=null;
  bossEntrance=null;
  hitStopUntil=0;
  damageFlash=0;
  bgIndex=0;
  stageIndex=0;
  stagePhase=0;
  difficultyPhase=0;
  phaseStartTime=0;
  musicMode=0;
  musicStep=0;
  best=Number(localStorage.getItem("miniGalaxiaBest")||0);
  update.enemyTimer=0;
  updateUI();
}

function updateUI(){
  scoreEl.textContent=score;
  lifeEl.textContent=life;
  bestEl.textContent=best;
  shotEl.textContent=weaponMode==="normal"?shotLevel:weaponMode.toUpperCase();
}

function startGame(){
  resetVars();
  startTime=performance.now();
  state="play";
  title.style.display="none";
  msg.style.display="none";
  showWarning(currentStage().warning);
  startMusic();
}

function gameOver(){
  state="over";
  if(score>best){
    best=score;
    localStorage.setItem("miniGalaxiaBest",String(best));
  }
  updateUI();
  msg.innerHTML=
    "GAME OVER<br><small>Score: "+score+" / Best: "+best+"</small><br>"+
    "<button data-action=\"restart\">RESTART</button>"+
    "<button data-action=\"continue\">CONTINUE</button>";
  msg.style.display="block";
}

function continueGame(){
  life=1;
  state="play";
  msg.style.display="none";
  player={x:W/2,y:H-80,w:38,h:48};
  enemyBullets=[];
  enemies=enemies.filter(e=>e.type==="boss"||e.type==="midboss");
  invincibleUntil=performance.now()+3500;
  playerHitInvincibleUntil=performance.now()+3500;
  bossClearUntil=performance.now()+1800;
  update.enemyTimer=0;
  damageFlash=0;
  updateUI();
}

function showWarning(text){
  warningEl.textContent=text;
  warningEl.style.display="block";
  shake=16;
  setTimeout(()=>warningEl.style.display="none",1100);
}

function clamp(v,min,max){return Math.max(min,Math.min(max,v));}

function movePlayer(x,y){
  if(!player)return;
  player.x=clamp(x,25,W-25);
  player.y=clamp(y,35,H-40);
}

function unlockAudio(){
  if(!audioCtx){
    const AC=window.AudioContext||window.webkitAudioContext;
    if(AC)audioCtx=new AC();
  }
  if(audioCtx && audioCtx.state==="suspended")audioCtx.resume();
}

function playTone(freq,duration,type="square",volume=.04,delay=0){
  if(!audioCtx)return;
  const now=audioCtx.currentTime+delay;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.type=type;
  osc.frequency.setValueAtTime(freq,now);
  gain.gain.setValueAtTime(0,now);
  gain.gain.linearRampToValueAtTime(volume,now+.01);
  gain.gain.exponentialRampToValueAtTime(.001,now+duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now+duration+.03);
}

function startMusic(){
  unlockAudio();
  if(musicTimer)return;
  musicTimer=setInterval(()=>{
    if(state!=="play"||!audioCtx)return;
    musicStep++;
    if(musicMode===0){
      if(musicStep%4===0)playTone(392,.10,"triangle",.025);
      if(musicStep%8===0)playTone(523,.12,"triangle",.02);
    }else if(musicMode===1){
      playTone(523,.07,"square",.035);
      if(musicStep%2===0)playTone(784,.05,"triangle",.02,.04);
    }else{
      playTone(523,.045,"square",.055);
      playTone(659,.045,"square",.045,.03);
      playTone(880,.045,"triangle",.035,.06);
    }
  },120);
}

function shoot(t){
  const delay=weaponMode==="bomb"?240:weaponMode==="spread"?260:210;
  if(t-lastShot<delay)return;

  if(weaponMode==="spread"){
    for(let i=-1;i<=1;i++){
      bullets.push({
        x:player.x,
        y:player.y-35,
        w:5,
        h:15,
        vx:i*1.8,
        vy:-8.8+Math.abs(i)*.25,
        s:8.5,
        type:"spread"
      });
    }
    playTone(1180,.05,"square",.04);
    lastShot=t;
    return;
  }

  if(weaponMode==="bomb"){
    bullets.push({
      x:player.x,
      y:player.y-36,
      w:13,
      h:20,
      vx:0,
      vy:-8.0,
      s:8.0,
      type:"bomb",
      damage:3,
      blast:62
    });
    playTone(620,.08,"sawtooth",.045);
    lastShot=t;
    return;
  }

  if(shotLevel===1){
    bullets.push({x:player.x,y:player.y-35,w:5,h:15,vx:0,vy:-9,s:9,type:"normal"});
  }else if(shotLevel===2){
    bullets.push({x:player.x-9,y:player.y-35,w:5,h:15,vx:0,vy:-9,s:9,type:"normal"});
    bullets.push({x:player.x+9,y:player.y-35,w:5,h:15,vx:0,vy:-9,s:9,type:"normal"});
  }else{
    bullets.push({x:player.x,y:player.y-38,w:5,h:15,vx:0,vy:-9,s:9,type:"normal"});
    bullets.push({x:player.x-15,y:player.y-32,w:5,h:15,vx:0,vy:-9,s:9,type:"normal"});
    bullets.push({x:player.x+15,y:player.y-32,w:5,h:15,vx:0,vy:-9,s:9,type:"normal"});
  }

  playTone(980,.04,"square",.035);
  lastShot=t;
}

function hasBoss(){
  return enemies.some(e=>e.type==="midboss"||e.type==="boss");
}

function currentStage(){
  return STAGES[stageIndex%STAGES.length];
}

function currentAreaName(){
  const stage=currentStage();
  return stagePhase===0?stage.from:stage.earth;
}

function currentMinionStage(){
  return currentStage().minionStage;
}

function currentBossStage(){
  return currentStage().bossStage;
}

function getPhasePower(){
  if(difficultyPhase===0)return {spawn:.6,speed:.8};
  if(difficultyPhase===1)return {spawn:1.52,speed:1.3};
  if(difficultyPhase===2)return {spawn:1.0,speed:1.0};
  if(difficultyPhase===3)return {spawn:1.71,speed:1.4};
  return {spawn:.5,speed:.7};
}

function spawnEnemy(){
  let type="normal";
  let variant="base";
  let hp=1;
  let size={w:30,h:25};
  let speedMul=1;
  const minionStage=currentMinionStage();
  const roll=Math.random();

  if(stageIndex===0){
    if(roll<.176)type="split";
    else if(roll<.356)type="follow";
    if(type==="follow"){hp=2;size={w:38,h:32};}
    else if(type==="split"){size={w:42,h:36};}
  }else if(stageIndex===1){
    if(roll<.24){variant="fast";speedMul=1.22;size={w:26,h:22};}
    else if(roll<.42){variant="shield";hp=2;speedMul=.82;size={w:36,h:30};}
    else if(roll<.62){variant="zigzag";speedMul=.98;}
  }else if(stageIndex===2){
    if(roll<.24){variant="shard";speedMul=1.18;size={w:26,h:24};}
    else if(roll<.46){variant="crater";hp=2;speedMul=.74;size={w:38,h:34};}
    else if(roll<.64){type="curve";size={w:42,h:36};}
  }else if(stageIndex===3){
    if(roll<.26){variant="larva";speedMul=1.2;size={w:24,h:38};}
    else if(roll<.48){variant="armor";hp=2;speedMul=.78;size={w:34,h:48};}
    else if(roll<.66){variant="weaver";speedMul=.95;size={w:30,h:42};}
  }

  enemies.push({
    x:30+Math.random()*(W-60),
    y:-40,
    w:size.w,
    h:size.h,
    s:(2.2+Math.random()*1.7)*enemySpeed*speedMul,
    type,
    variant,
    hp,
    maxHp:hp,
    angle:Math.random()*Math.PI*2,
    stage:minionStage,
    hitFlash:0,
    enraged:false
  });
}

function spawnMidBoss(){
  showWarning("MID BOSS");
  const bossStage=currentBossStage();
  const midBossHp=5+stageIndex*2;
  enemies.push({
    x:60+Math.random()*(W-120),
    y:-70,
    w:78,
    h:68,
    s:1.45*enemySpeed,
    type:"midboss",
    hp:midBossHp,
    maxHp:midBossHp,
    stage:bossStage,
    vx:bossStage===2?2.1:bossStage===3?(Math.random()>.5?1:-1)*1.1:1.2,
    angle:Math.random()*Math.PI*2,
    shotTimer:0,
    hitFlash:0
  });
}

function spawnBoss(){
  const stage=currentStage();
  const bossStage=currentBossStage();
  showWarning(stage.boss);
  const now=performance.now();
  bossIntro=now+2000;
  bossEntrance={stage:bossStage,born:now,until:now+4200};
  bossRage=false;
  shockwaves.push({x:W/2,y:H*.28,born:now,duration:2000});

  const bossHp=[20,30,26,34][stageIndex]||30;
  enemies.push({
    x:W/2,
    y:-120,
    w:112,
    h:94,
    s:1,
    vx:1.2,
    type:"boss",
    hp:bossHp,
    maxHp:bossHp,
    stage:bossStage,
    name:stage.boss,
    shotTimer:0,
    rageShotTimer:0,
    hitFlash:0,
    rageStarted:false
  });
}

function bossShoot(e,t){
  const rage=e.hp<e.maxHp*.4;
  const cooldown=rage ? 650 : 1200;
  if(t-e.shotTimer<cooldown)return;
  e.shotTimer=t;

  if(rage){
    if(e.stage===0){
      for(let i=-2;i<=2;i++){
        enemyBullets.push({x:e.x,y:e.y+28,w:8,h:14,vx:i*1.15,vy:4.7});
      }
      enemyBullets.push({x:e.x-36,y:e.y+18,w:8,h:14,vx:-2.2,vy:3.8});
      enemyBullets.push({x:e.x+36,y:e.y+18,w:8,h:14,vx:2.2,vy:3.8});
    }else if(e.stage===1){
      for(let i=-4;i<=4;i++){
        enemyBullets.push({x:e.x,y:e.y+26,w:8,h:14,vx:i*.75,vy:3.5+Math.abs(i)*.15});
      }
    }else if(e.stage===2){
      enemyBullets.push({x:e.x,y:e.y+30,w:8,h:18,vx:0,vy:7.2});
      enemyBullets.push({x:e.x-24,y:e.y+22,w:8,h:18,vx:-.4,vy:6.5});
      enemyBullets.push({x:e.x+24,y:e.y+22,w:8,h:18,vx:.4,vy:6.5});
      if(t-e.rageShotTimer>1300){
        e.rageShotTimer=t;
        for(let i=-2;i<=2;i++){
          enemyBullets.push({x:e.x,y:e.y+16,w:8,h:14,vx:i*1.3,vy:5.1});
        }
      }
    }else{
      for(let i=-2;i<=2;i++){
        enemyBullets.push({x:e.x,y:e.y+30,w:8,h:14,vx:i*1.25,vy:4.0,curve:.04*i});
      }
      enemyBullets.push({x:e.x-34,y:e.y+22,w:8,h:14,vx:-1.1,vy:3.8,curve:-.055});
      enemyBullets.push({x:e.x+34,y:e.y+22,w:8,h:14,vx:1.1,vy:3.8,curve:.055});
    }
    return;
  }

  if(e.stage===0){
    enemyBullets.push({x:e.x,y:e.y+30,w:8,h:14,vx:0,vy:4.2});
    enemyBullets.push({x:e.x-24,y:e.y+25,w:8,h:14,vx:-1,vy:4});
    enemyBullets.push({x:e.x+24,y:e.y+25,w:8,h:14,vx:1,vy:4});
  }else if(e.stage===1){
    for(let i=-2;i<=2;i++){
      enemyBullets.push({x:e.x,y:e.y+30,w:8,h:14,vx:i*1.25,vy:3.6});
    }
  }else if(e.stage===2){
    enemyBullets.push({x:e.x,y:e.y+30,w:8,h:14,vx:0,vy:6});
    enemyBullets.push({x:e.x-18,y:e.y+25,w:8,h:14,vx:0,vy:5.6});
    enemyBullets.push({x:e.x+18,y:e.y+25,w:8,h:14,vx:0,vy:5.6});
  }else{
    for(let i=-1;i<=1;i++){
      enemyBullets.push({x:e.x,y:e.y+30,w:8,h:14,vx:i*1.8,vy:3.8,curve:.045*i});
    }
  }

}

function midBossShoot(e,t){
  const cooldown=e.stage===2?1450:e.stage===3?1750:2100;
  if(t-e.shotTimer<cooldown)return;
  e.shotTimer=t;

  if(e.stage===0){
    enemyBullets.push({x:e.x-22,y:e.y+22,w:7,h:13,vx:-.7,vy:3.9});
    enemyBullets.push({x:e.x+22,y:e.y+22,w:7,h:13,vx:.7,vy:3.9});
  }else if(e.stage===1){
    enemyBullets.push({x:e.x,y:e.y+26,w:10,h:16,vx:0,vy:3.4});
  }else if(e.stage===2){
    enemyBullets.push({x:e.x,y:e.y+28,w:7,h:15,vx:0,vy:5.2});
  }else{
    enemyBullets.push({x:e.x-14,y:e.y+22,w:7,h:13,vx:-1.2,vy:3.6,curve:-.035});
    enemyBullets.push({x:e.x+14,y:e.y+22,w:7,h:13,vx:1.2,vy:3.6,curve:.035});
  }
}

function dropItem(x,y,type,opts={}){
  items.push({
    x,y,
    w:34,
    h:34,
    s:opts.s!==undefined?opts.s:1.8,
    type,
    sealed:true,
    openFlash:0
  });
}

function boom(x,y,big=false){
  const count=big?34:18;
  for(let i=0;i<count;i++){
    booms.push({
      x,y,
      vx:(Math.random()-.5)*(big?8:5),
      vy:(Math.random()-.5)*(big?8:5),
      r:2+Math.random()*(big?5:3),
      life:big?34:24
    });
  }
  playTone(160,.12,"sawtooth",.04);
}

function splitEnemy(e){
  for(let k=-1;k<=1;k+=2){
    enemies.push({
      x:e.x+k*14,
      y:e.y,
      w:28,
      h:24,
      s:e.s+0.4,
      type:"normal",
      hp:1,
      maxHp:1,
      angle:0
    });
  }
}

function spawnMidBossMinions(e){
  enemies.push({
    x:clamp(e.x,34,W-34),
    y:e.y+8,
    w:34,
    h:30,
    s:e.s+1.0,
    vx:(Math.random()>.5?1:-1)*1.2,
    type:"split",
    hp:2,
    maxHp:2,
    angle:Math.random()*Math.PI*2
  });
  shockwaves.push({x:e.x,y:e.y,born:performance.now(),duration:560});
}

function randomWeaponItem(){
  const pool=["spread","down","bomb"];
  return pool[Math.floor(Math.random()*pool.length)];
}

function stageRewardItem(){
  if(shotLevel<3)return "shot3";
  const pool=["down","shot2","shot3","spread","bomb","invincible"];
  return pool[Math.floor(Math.random()*pool.length)];
}

function spawnStageRewardCapsule(){
  dropItem(W*.5,H*.24,stageRewardItem(),{s:.7});
}

function midBossDropType(stage){
  if(stage===1 && Math.random()<.35)return "invincible";
  if(stage===2 && Math.random()<.45)return "spread";
  if(stage===3 && Math.random()<.45)return "bomb";
  return "shot2";
}

function openCapsule(it){
  if(!it.sealed)return;
  it.sealed=false;
  it.w=28;
  it.h=28;
  it.s=2.2;
  it.openFlash=12;
  shake=6;
  shockwaves.push({x:it.x,y:it.y,born:performance.now(),duration:360});
  playTone(1040,.07,"triangle",.05);
}

function blastDamage(x,y,r,source){
  shockwaves.push({x,y,born:performance.now(),duration:420});
  boom(x,y,true);
  enemies.forEach(e=>{
    if(e===source)return;
    const dx=e.x-x;
    const dy=e.y-y;
    if(Math.sqrt(dx*dx+dy*dy)<r){
      e.hp-=2;
      e.hitFlash=5;
    }
  });
}

function hit(a,b){
  return a.x-a.w/2<b.x+b.w/2 &&
         a.x+a.w/2>b.x-b.w/2 &&
         a.y-a.h/2<b.y+b.h/2 &&
         a.y+a.h/2>b.y-b.h/2;
}

function roundedRectPath(x,y,w,h,r){
  const radius=Math.min(r,w/2,h/2);
  ctx.moveTo(x+radius,y);
  ctx.lineTo(x+w-radius,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+radius);
  ctx.lineTo(x+w,y+h-radius);
  ctx.quadraticCurveTo(x+w,y+h,x+w-radius,y+h);
  ctx.lineTo(x+radius,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-radius);
  ctx.lineTo(x,y+radius);
  ctx.quadraticCurveTo(x,y,x+radius,y);
}

function playerDamage(t){
  const invincible=t<invincibleUntil || t<playerHitInvincibleUntil;
  if(invincible)return;

  life--;
  shake=22;
  damageFlash=1;
  hitStopUntil=t+120;
  playerHitInvincibleUntil=t+1500;
  updateUI();

  if(life<=0)gameOver();
}

function defeatEnemy(e,t){
  const idx=enemies.indexOf(e);
  if(idx>=0)enemies.splice(idx,1);

  if(e.type==="boss"){
    boom(e.x,e.y,true);
    shake=40;
    hitStopUntil=t+300;
    bossClearUntil=t+2000;
    enemyBullets=[];
    update.enemyTimer=0;
    bossRage=false;
    shockwaves.push({x:e.x,y:e.y,born:performance.now(),duration:900});
    shockwaves.push({x:e.x-48,y:e.y+8,born:performance.now()+80,duration:760});
    shockwaves.push({x:e.x+48,y:e.y+8,born:performance.now()+140,duration:760});
  }else{
    boom(e.x,e.y,e.type!=="normal");
    shake=e.type==="normal"?5:14;
  }

  if(e.type==="split"){
    splitEnemy(e);
    score+=15;
  }else if(e.type==="midboss"){
    score+=50;
    spawnMidBossMinions(e);
    dropItem(e.x,e.y,midBossDropType(e.stage||0));
    stagePhase=1;
    bgIndex=currentMinionStage();
    clearBanner={
      until:t+1800,
      boss:"MID BOSS",
      next:currentAreaName()
    };
    bossClearUntil=t+1800;
    showWarning("EARTH DEFENSE");
  }else if(e.type==="boss"){
    const clearedStage=currentStage();
    score+=120;
    spawnStageRewardCapsule();
    life=Math.min(life+1,5);
    stageIndex=(stageIndex+1)%STAGES.length;
    stagePhase=0;
    bgIndex=currentMinionStage();
    clearBanner={
      until:t+2200,
      boss:clearedStage.title,
      next:currentStage().title
    };
  }else{
    score+=10;
  }

  updateUI();
}

function update(t){
  if(state!=="play")return;
  if(t<hitStopUntil)return;
  if(performance.now()<bossIntro)return;

  trail.push({x:player.x,y:player.y});
  if(trail.length>10)trail.shift();

  const elapsed=t-startTime;
  const elapsedSec=elapsed/1000;

  if(elapsedSec-phaseStartTime>10){
    difficultyPhase=(difficultyPhase+1)%5;
    phaseStartTime=elapsedSec;
    if(difficultyPhase===1||difficultyPhase===3)showWarning("INTENSE");
  }

  if(difficultyPhase===0||difficultyPhase===4)musicMode=0;
  else if(difficultyPhase===2)musicMode=1;
  else musicMode=2;

  const phase=getPhasePower();

  while(elapsed-lastDifficultyAt>=30000){
    enemySpeed=Math.min(MAX_ENEMY_SPEED,enemySpeed*1.03);
    lastDifficultyAt+=30000;
  }

  while(elapsed>=nextBossAt){
    bossCount++;
    if(bossCount%2===1)spawnMidBoss();
    else spawnBoss();
    nextBossAt+=30000;
  }

  shoot(t);

  update.enemyTimer++;
  let gap=Math.max(16,36-Math.floor(score/100));
  gap=gap/phase.spawn;
  if(hasBoss())gap*=10;

  if(t>=bossClearUntil && update.enemyTimer>gap){
    spawnEnemy();
    update.enemyTimer=0;
  }

  bullets.forEach(b=>{
    b.x+=b.vx||0;
    b.y+=b.vy!==undefined?b.vy:-(b.s||9);
  });
  bullets=bullets.filter(b=>b.y>-30&&b.x>-40&&b.x<W+40);

  enemyBullets.forEach(b=>{
    b.x+=b.vx;
    if(b.curve)b.vx+=b.curve;
    b.y+=b.vy;
  });
  enemyBullets=enemyBullets.filter(b=>b.y<H+30&&b.x>-50&&b.x<W+50);

  enemies.forEach(e=>{
    if(e.type==="boss"){
      if(e.hp<e.maxHp*.4){
        bossRage=true;
        if(!e.rageStarted){
          e.rageStarted=true;
          showWarning("BOSS RAGE");
          shake=24;
          shockwaves.push({x:e.x,y:e.y,born:performance.now(),duration:900});
          playTone(110,.18,"sawtooth",.06);
        }
        e.vx=e.vx<0?-2.2:2.2;
      }

      if(e.y<90)e.y+=1.1;
      else{
        e.x+=e.vx;
        if(e.x<65||e.x>W-65)e.vx*=-1;
      }
      bossShoot(e,t);
    }else if(e.type==="midboss"){
      if(e.stage===0){
        e.y+=e.s*phase.speed;
        e.x+=Math.sin(e.angle)*1.8;
        e.angle+=.075;
      }else if(e.stage===1){
        e.y+=e.s*.78*phase.speed;
        e.x+=Math.sin(e.angle)*.9;
        e.angle+=.045;
      }else if(e.stage===2){
        e.y+=e.s*.95*phase.speed;
        e.x+=e.vx;
        if(e.x<50||e.x>W-50)e.vx*=-1;
      }else{
        e.y+=e.s*1.22*phase.speed;
        e.x+=e.vx+Math.sin(e.angle)*1.4;
        e.angle+=.12;
        if(e.x<42||e.x>W-42)e.vx*=-1;
      }
      midBossShoot(e,t);
    }else if(e.type==="curve"){
      e.y+=e.s*phase.speed;
      e.x+=Math.sin(e.angle)*3;
      e.angle+=0.1;
    }else if(e.type==="follow"){
      e.y+=e.enraged?3.0:e.s*phase.speed;
      e.x+=(player.x-e.x)*(e.enraged?.09:.02);
    }else if(e.type==="split"){
      e.y+=e.s*phase.speed;
      e.x+=e.vx||0;
      e.vx*=.985;
      if(e.x<24||e.x>W-24)e.vx*=-1;
    }else{
      e.y+=e.s*phase.speed;
      if(e.variant==="zigzag"){
        e.x+=Math.sin(e.angle)*3.2;
        e.angle+=.11;
      }else if(e.variant==="shard"){
        e.x+=Math.sin(e.angle)*2.5;
        e.angle+=.08;
      }else if(e.variant==="crater"){
        e.x+=Math.sin(e.angle)*.85;
        e.angle+=.035;
      }else if(e.variant==="larva"){
        e.x+=Math.sin(e.angle)*2.2;
        e.angle+=.14;
      }else if(e.variant==="armor"){
        e.x+=Math.sin(e.angle)*.75;
        e.angle+=.045;
      }else if(e.variant==="weaver"){
        e.x+=Math.sin(e.angle)*4.1;
        e.angle+=.16;
      }
    }
  });

  items.forEach(it=>it.y+=it.s);
  items=items.filter(it=>it.y<H+40);

  booms.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
  booms=booms.filter(p=>p.life>0);

  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    if(!it.sealed)continue;

    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      if(hit(b,it)){
        bullets.splice(j,1);
        openCapsule(it);
        break;
      }
    }
  }

  for(let i=enemyBullets.length-1;i>=0;i--){
    if(hit(player,enemyBullets[i])){
      enemyBullets.splice(i,1);
      playerDamage(t);
    }
  }

  for(let i=items.length-1;i>=0;i--){
    if(hit(player,items[i])){
      const it=items[i];
      if(it.sealed)continue;
      if(it.type==="shot2"){
        shotLevel=2;
        weaponMode="normal";
      }
      if(it.type==="shot3"){
        shotLevel=3;
        weaponMode="normal";
      }
      if(it.type==="spread"){
        weaponMode="spread";
      }
      if(it.type==="down"){
        shotLevel=1;
        weaponMode="normal";
      }
      if(it.type==="bomb"){
        weaponMode="bomb";
      }
      if(it.type==="invincible")invincibleUntil=t+5000;
      items.splice(i,1);
      playTone(880,.08,"triangle",.05);
      updateUI();
    }
  }

  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];

    if(hit(player,e)){
      enemies.splice(i,1);
      boom(e.x,e.y,e.type!=="normal");
      playerDamage(t);
      continue;
    }

    if(e.y>H+50){
      enemies.splice(i,1);
      life--;
      damageFlash=.6;
      updateUI();
      if(life<=0)gameOver();
      continue;
    }

    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];

      if(hit(b,e)){
        bullets.splice(j,1);
        e.hp-=b.damage||1;
        e.hitFlash=5;
        if(b.type==="bomb"){
          blastDamage(b.x,b.y,b.blast||58,e);
          shake=18;
        }

        if(e.hp>0){
          if(e.type==="follow"){
            e.enraged=true;
            e.s=3.0;
            shake=10;
            shockwaves.push({x:e.x,y:e.y,born:performance.now(),duration:320});
            playTone(220,.08,"sawtooth",.045);
          }else{
            shake=e.type==="boss"?8:3;
          }
          continue;
        }

        defeatEnemy(e,t);
        break;
      }
    }
  }

  for(let i=enemies.length-1;i>=0;i--){
    if(enemies[i].hp<=0)defeatEnemy(enemies[i],t);
  }
}

function drawBackground(){
  const t=Date.now();
  const area=currentAreaName();
  const stage=currentStage();
  const bg=ctx.createLinearGradient(0,0,0,H);

  if(area==="Moon"){
    bg.addColorStop(0,"#111827");bg.addColorStop(.6,"#374151");bg.addColorStop(1,"#0f172a");
  }else if(area==="Earth Sky"){
    bg.addColorStop(0,"#38bdf8");bg.addColorStop(.55,"#7dd3fc");bg.addColorStop(1,"#dcfce7");
  }else if(area==="Night Sky"){
    bg.addColorStop(0,"#020617");bg.addColorStop(.52,"#172554");bg.addColorStop(1,"#0f172a");
  }else if(area==="City"){
    bg.addColorStop(0,"#0f172a");bg.addColorStop(.56,"#1e3a8a");bg.addColorStop(1,"#0f766e");
  }else if(area==="Desert"){
    bg.addColorStop(0,"#fbbf24");bg.addColorStop(.58,"#fb923c");bg.addColorStop(1,"#7c2d12");
  }else if(area==="Solar Zone"){
    bg.addColorStop(0,"#3b0505");bg.addColorStop(.48,"#b91c1c");bg.addColorStop(1,"#fb923c");
  }else if(area==="Orbit"){
    bg.addColorStop(0,"#031a2f");bg.addColorStop(.48,"#075985");bg.addColorStop(1,"#020617");
  }else{
    bg.addColorStop(0,"#070421");bg.addColorStop(.45,"#061329");bg.addColorStop(1,"#020617");
  }

  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);

  if(area==="Space"||area==="Orbit"||area==="Moon"||area==="Night Sky"||area==="Solar Zone"){
    stars.forEach(s=>{
      const y=(s.y+t/28*s.s)%H;
      ctx.fillStyle=area==="Solar Zone"?"#fed7aa":"#e0f2fe";
      ctx.globalAlpha=.75;
      ctx.fillRect(s.x,y,s.r,s.r);
    });
    ctx.globalAlpha=1;
  }

  if(area==="Earth Sky"||area==="Orbit"){
    ctx.fillStyle="rgba(255,255,255,.7)";
    for(let i=0;i<5;i++){
      const x=(i*180+t/70)%(W+220)-110;
      const y=H*.16+i%3*52;
      ctx.beginPath();
      ctx.arc(x,y,24,0,Math.PI*2);
      ctx.arc(x+28,y+4,30,0,Math.PI*2);
      ctx.arc(x+62,y,21,0,Math.PI*2);
      ctx.fill();
    }
  }

  if(area==="City"){
    ctx.fillStyle="rgba(14,116,144,.18)";
    for(let i=0;i<5;i++){
      const x=(i*170-t/110)%(W+220)-110;
      const y=H*.2+i%2*38;
      ctx.beginPath();
      ctx.arc(x,y,26,0,Math.PI*2);
      ctx.arc(x+30,y+6,33,0,Math.PI*2);
      ctx.arc(x+66,y,24,0,Math.PI*2);
      ctx.fill();
    }

    ctx.fillStyle="rgba(15,23,42,.72)";
    const backBase=H*.82;
    for(let i=0;i<12;i++){
      const bw=34+(i%3)*12;
      const bh=80+(i%5)*22;
      const x=i*(W/11)-18;
      ctx.fillRect(x,backBase-bh,bw,bh);
    }

    ctx.fillStyle="rgba(2,6,23,.88)";
    const frontBase=H*.95;
    for(let i=0;i<9;i++){
      const bw=46+(i%4)*10;
      const bh=120+(i%4)*34;
      const x=i*(W/8)-28;
      ctx.fillRect(x,frontBase-bh,bw,bh);
      ctx.fillStyle="rgba(125,211,252,.65)";
      for(let r=0;r<Math.floor(bh/22);r++){
        for(let c=0;c<2+(i%2);c++){
          if((r+c+i)%3!==0)ctx.fillRect(x+8+c*14,frontBase-bh+14+r*20,5,7);
        }
      }
      ctx.fillStyle="rgba(2,6,23,.88)";
    }

    ctx.fillStyle="rgba(34,197,94,.22)";
    ctx.fillRect(0,H*.94,W,H*.06);
  }

  if(area==="Night Sky"){
    ctx.fillStyle="rgba(226,232,240,.8)";
    ctx.beginPath();
    ctx.arc(W*.78,H*.18,24,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="rgba(2,6,23,.9)";
    ctx.beginPath();
    ctx.arc(W*.79,H*.16,20,0,Math.PI*2);
    ctx.fill();
  }

  if(area==="Desert"){
    ctx.fillStyle="rgba(254,243,199,.7)";
    ctx.beginPath();
    ctx.arc(W*.82,H*.18,28,0,Math.PI*2);
    ctx.fill();
  }

  if(area==="Solar Zone"){
    ctx.fillStyle="rgba(254,202,202,.55)";
    ctx.beginPath();
    ctx.arc(W*.78,H*.18,54,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle="rgba(254,215,170,.45)";
    ctx.lineWidth=3;
    for(let i=0;i<4;i++){
      ctx.beginPath();
      ctx.arc(W*.78,H*.18,76+i*24+(t/80)%18,0,Math.PI*2);
      ctx.stroke();
    }
  }

  ctx.fillStyle="rgba(15,23,42,.45)";
  ctx.fillRect(8,34,210,38);
  ctx.fillStyle="#e0f2fe";
  ctx.font="bold 12px sans-serif";
  ctx.fillText("STAGE "+(stageIndex+1)+" - "+stage.title.toUpperCase(),16,50);
  ctx.font="12px sans-serif";
  ctx.fillText("AREA: "+area.toUpperCase(),16,66);
}

function drawTrail(){
  if(!trail.length)return;
  trail.forEach((p,i)=>{
    const alpha=(i+1)/trail.length*.22;
    const radius=6+i*.55;
    ctx.globalAlpha=alpha;
    ctx.shadowBlur=18;
    ctx.shadowColor="#38bdf8";
    ctx.fillStyle="#38bdf8";
    ctx.beginPath();
    ctx.arc(p.x,p.y+16, radius,0,Math.PI*2);
    ctx.fill();
  });
  ctx.shadowBlur=0;
  ctx.globalAlpha=1;
}

function getPlayerForm(){
  if(weaponMode==="bomb")return "bomb";
  if(weaponMode==="spread")return "spread";
  return "shot"+shotLevel;
}

function drawPlayerParts(form){
  const x=player.x;
  const y=player.y;

  ctx.save();
  ctx.shadowBlur=12;

  if(form==="shot2"||form==="shot3"){
    ctx.shadowColor="#7dd3fc";
    ctx.fillStyle="#0ea5e9";
    [-16,16].forEach(side=>{
      ctx.fillRect(x+side-4,y+6,8,23);
      ctx.fillStyle="#bae6fd";
      ctx.fillRect(x+side-2,y-2,4,9);
      ctx.fillStyle="#0ea5e9";
    });
  }

  if(form==="shot3"){
    ctx.shadowColor="#facc15";
    ctx.fillStyle="#facc15";
    ctx.beginPath();
    ctx.moveTo(x,y-42);
    ctx.lineTo(x+5,y-27);
    ctx.lineTo(x-5,y-27);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle="#bae6fd";
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(x-34,y+18);
    ctx.lineTo(x-43,y+29);
    ctx.moveTo(x+34,y+18);
    ctx.lineTo(x+43,y+29);
    ctx.stroke();
  }

  if(form==="bomb"){
    ctx.shadowColor="#22c55e";
    ctx.fillStyle="#14532d";
    ctx.beginPath();
    ctx.moveTo(x-18,y-6);
    ctx.lineTo(x-31,y+21);
    ctx.lineTo(x-12,y+28);
    ctx.lineTo(x,y+16);
    ctx.lineTo(x+12,y+28);
    ctx.lineTo(x+31,y+21);
    ctx.lineTo(x+18,y-6);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle="#22c55e";
    ctx.beginPath();
    ctx.ellipse(x,y+18,11,17,0,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="#bbf7d0";
    ctx.fillRect(x-4,y+1,8,11);
  }

  if(form==="spread"){
    ctx.shadowColor="#fb923c";
    ctx.fillStyle="#c2410c";
    ctx.beginPath();
    ctx.moveTo(x-10,y+2);
    ctx.lineTo(x-46,y+18);
    ctx.lineTo(x-30,y+30);
    ctx.lineTo(x-7,y+19);
    ctx.lineTo(x+7,y+19);
    ctx.lineTo(x+30,y+30);
    ctx.lineTo(x+46,y+18);
    ctx.lineTo(x+10,y+2);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle="#fed7aa";
    ctx.lineWidth=2;
    ctx.beginPath();

    ctx.lineTo(x-38,y+23);
    ctx.moveTo(x,y+8);
    ctx.lineTo(x,y+28);
    ctx.moveTo(x+11,y+8);
    ctx.lineTo(x+38,y+23);
    ctx.stroke();
  }

  ctx.restore();
}

function drawPlayer(){
  const now=performance.now();
  const form=getPlayerForm();
  const invincible=now<invincibleUntil || now<playerHitInvincibleUntil;
  if(invincible&&Math.floor(now/90)%2===0)ctx.globalAlpha=.45;

  ctx.shadowBlur=invincible?28:18;
  ctx.shadowColor=invincible?"#facc15":"#38bdf8";

  const g=ctx.createLinearGradient(player.x,player.y-30,player.x,player.y+30);

  g.addColorStop(.5,"#38bdf8");

  ctx.lineTo(player.x+12,player.y+4);
  ctx.lineTo(player.x+33,player.y+23);
  ctx.lineTo(player.x+10,player.y+19);
  ctx.lineTo(player.x+4,player.y+32);
  ctx.lineTo(player.x,player.y+23);
  ctx.lineTo(player.x-4,player.y+32);
  ctx.lineTo(player.x-10,player.y+19);
  ctx.lineTo(player.x-33,player.y+23);
  ctx.lineTo(player.x-12,player.y+4);

  ctx.lineTo(player.x-25,player.y+25);
  ctx.moveTo(player.x+10,player.y+10);
  ctx.lineTo(player.x+25,player.y+25);

  ctx.strokeStyle="rgba(224,242,254,.85)";
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(player.x,player.y-25);
  ctx.lineTo(player.x,player.y+20);
  ctx.moveTo(player.x-13,player.y+2);
  ctx.lineTo(player.x+13,player.y+2);
  ctx.stroke();

  ctx.fillStyle="#e0f2fe";
  ctx.beginPath();
  ctx.ellipse(player.x,player.y-11,6,13,0,0,Math.PI*2);
  ctx.fill();

  const t=now*.02;
  const flame=18+Math.sin(t)*6;
  const flicker=Math.sin(t*1.7)*2;

  ctx.shadowBlur=18;
  ctx.shadowColor="#f97316";
  ctx.fillStyle="#f97316";
  ctx.beginPath();
  ctx.moveTo(player.x,player.y+40+flicker);
  ctx.lineTo(player.x+6,player.y+20);
  ctx.lineTo(player.x-6,player.y+20);
  ctx.closePath();
  ctx.fill();

  ctx.shadowColor="#facc15";
  ctx.fillStyle="#facc15";
  ctx.beginPath();
  ctx.moveTo(player.x,player.y+40+flame);
  ctx.lineTo(player.x+4,player.y+24);
  ctx.lineTo(player.x-4,player.y+24);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur=0;

  if(invincible){
    ctx.strokeStyle="#facc15";
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(player.x,player.y,42,0,Math.PI*2);
    ctx.stroke();
  }
}

function drawEnemy(e){
  if(e.type==="boss"){
    ctx.save();
    if(bossRage){
      ctx.shadowBlur=34;
      ctx.shadowColor="#ef4444";
    }
    if(e.hitFlash>0){
      ctx.globalAlpha=.5;
      e.hitFlash--;
    }
    if(e.stage===0)drawBossSpace(e);
    else if(e.stage===1)drawBossMoon(e);
    else if(e.stage===2)drawBossSky(e);
    else drawBossDesert(e);
    ctx.restore();
    drawHp(e);
    return;
  }

  if(e.type==="midboss"){
    drawMidBoss(e);
    drawHp(e);
    return;
  }

  ctx.save();

  if(e.type==="normal"){
    drawStageMinion(e);
  }else if(e.type==="curve"){

    ctx.lineTo(e.x+36,e.y-10);
    ctx.lineTo(e.x+23,e.y+7);
    ctx.lineTo(e.x+8,e.y+14);
    ctx.lineTo(e.x,e.y+8);
    ctx.lineTo(e.x-8,e.y+14);
    ctx.lineTo(e.x-23,e.y+7);
    ctx.lineTo(e.x-36,e.y-10);
    ctx.lineTo(e.x-15,e.y-4);

    ctx.fillStyle="#fed7aa";

    ctx.fillStyle="#bbf7d0";
    ctx.beginPath();
    ctx.arc(e.x-5,e.y-3,4,0,Math.PI*2);
    ctx.arc(e.x+5,e.y-3,4,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#052e16";
    ctx.beginPath();
    ctx.arc(e.x-5,e.y-3,1.7,0,Math.PI*2);
    ctx.arc(e.x+5,e.y-3,1.7,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#86efac";
    ctx.beginPath();
    ctx.moveTo(e.x-9,e.y+8);
    ctx.lineTo(e.x-3,e.y+13);
    ctx.lineTo(e.x+3,e.y+13);
    ctx.lineTo(e.x+9,e.y+8);
    ctx.lineTo(e.x+3,e.y+10);
    ctx.lineTo(e.x,e.y+7);
    ctx.lineTo(e.x-3,e.y+10);
    ctx.closePath();
    ctx.fill();
  }else if(e.type==="follow"){
    const angry=e.enraged;
    const flash=e.hitFlash>0;
    const pulse=angry ? .65+Math.sin(Date.now()/70)*.35 : 0;
    ctx.translate(e.x,e.y);
    ctx.scale(.9,.9);
    ctx.translate(-e.x,-e.y);

    ctx.shadowBlur=angry?34:20;
    ctx.shadowColor=angry?"#f0abfc":"#a855f7";

    if(flash){
      ctx.globalAlpha=.45;
      e.hitFlash--;
    }

    ctx.fillStyle=flash?"#ffffff":angry?"#86198f":"#581c87";
    ctx.beginPath();
    ctx.ellipse(e.x,e.y,17,15,0,0,Math.PI*2);
    ctx.fill();

    if(angry){
      ctx.globalAlpha=.28+pulse*.22;
      ctx.strokeStyle="#f0abfc";
      ctx.lineWidth=5;
      ctx.beginPath();
      ctx.arc(e.x,e.y,29+pulse*7,0,Math.PI*2);
      ctx.stroke();
      ctx.globalAlpha=flash?.45:1;
    }

    ctx.strokeStyle=angry?"#f0abfc":"#a855f7";
    ctx.lineWidth=angry?4:3;
    ctx.beginPath();
    ctx.arc(e.x,e.y,23,Math.PI*.15,Math.PI*.85);
    ctx.arc(e.x,e.y,23,Math.PI*1.15,Math.PI*1.85);
    ctx.stroke();

    ctx.fillStyle=angry?"#fef08a":"#f5d0fe";
    ctx.beginPath();
    ctx.arc(e.x,e.y-2,angry?9:8,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle=angry?"#ef4444":"#020617";
    ctx.beginPath();
    ctx.arc(e.x,e.y-2,angry?4.2:3.3,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle=angry?"#fef08a":"#f0abfc";
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(e.x-14,e.y+(angry?11:9));
    ctx.quadraticCurveTo(e.x,e.y+(angry?20:17),e.x+14,e.y+(angry?11:9));

}

function drawStageMinion(e){
  const stage=e.stage||0;

    }

  }else if(stage===1){

      ctx.beginPath();
      ctx.moveTo(e.x,e.y-27);
      ctx.lineTo(e.x+9,e.y-4);
      ctx.lineTo(e.x+28,e.y+4);
      ctx.lineTo(e.x+6,e.y+10);
      ctx.lineTo(e.x,e.y+28);
      ctx.lineTo(e.x-6,e.y+10);
      ctx.lineTo(e.x-28,e.y+4);
      ctx.lineTo(e.x-9,e.y-4);
      ctx.closePath();
      ctx.fill();
    }

    if(variant==="crater"){
      ctx.fillStyle="#4b5563";
      [[-9,-10,5],[9,-7,4],[-2,9,7],[12,9,3]].forEach(c=>{
        ctx.beginPath();
        ctx.arc(e.x+c[0],e.y+c[1],c[2],0,Math.PI*2);
        ctx.fill();
      });
    }

    ctx.fillStyle="#111827";
    ctx.beginPath();
    ctx.arc(e.x-7,e.y-4,4,0,Math.PI*2);
    ctx.arc(e.x+7,e.y-4,4,0,Math.PI*2);
    ctx.fill();
    ctx.fillRect(e.x-9,e.y+7,18,4);

    ctx.fillStyle="#d1d5db";
    ctx.beginPath();
    ctx.arc(e.x+10,e.y+9,4,0,Math.PI*2);

  }else if(stage===2){

    ctx.beginPath();
    ctx.ellipse(e.x,e.y+bob+1,variant==="shield"?36:variant==="fast"?25:31,variant==="shield"?19:14,0,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle=flash?"#ffffff":variant==="shield"?"#164e63":variant==="fast"?"#1d4ed8":"#075985";
    ctx.beginPath();
    ctx.moveTo(e.x,e.y-24+bob);
    ctx.lineTo(e.x+(variant==="fast"?14:18),e.y-17+bob);
    ctx.lineTo(e.x+(variant==="shield"?29:25),e.y-2+bob);

    ctx.lineTo(e.x-13,e.y+13+bob);
    ctx.lineTo(e.x-(variant==="shield"?29:25),e.y-2+bob);
    ctx.lineTo(e.x-(variant==="fast"?14:18),e.y-17+bob);

    ctx.beginPath();
    ctx.moveTo(e.x-20,e.y-3+bob);
    ctx.lineTo(e.x-48,e.y+14+bob);
    ctx.lineTo(e.x-25,e.y+20+bob);
    ctx.lineTo(e.x-9,e.y+10+bob);
    ctx.moveTo(e.x+20,e.y-3+bob);
    ctx.lineTo(e.x+48,e.y+14+bob);
    ctx.lineTo(e.x+25,e.y+20+bob);
    ctx.lineTo(e.x+9,e.y+10+bob);

    ctx.strokeStyle="#7dd3fc";
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(e.x-38,e.y+13+bob);
    ctx.lineTo(e.x-17,e.y+6+bob);
    ctx.moveTo(e.x+38,e.y+13+bob);
    ctx.lineTo(e.x+17,e.y+6+bob);
    ctx.stroke();

    if(variant==="shield"){
      ctx.strokeStyle="#fef08a";
      ctx.lineWidth=3;
      ctx.beginPath();
      ctx.arc(e.x,e.y+bob,33,0,Math.PI*2);

    }else if(variant==="fast"){

      ctx.beginPath();
      ctx.moveTo(e.x,e.y-32+bob);

      ctx.moveTo(e.x+32,e.y-8+bob);
      ctx.lineTo(e.x+18,e.y+4+bob);
      ctx.lineTo(e.x+35,e.y+12+bob);
      ctx.stroke();
    }

    ctx.fillStyle="#1e3a8a";
    ctx.beginPath();
    roundedRectPath(e.x-15,e.y+7+bob,30,17,5);

    ctx.fillStyle="#bae6fd";
    ctx.beginPath();

    ctx.fillStyle="#facc15";
    ctx.beginPath();
    ctx.arc(e.x,e.y-6+bob,5.5,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="#0f172a";
    ctx.beginPath();
    ctx.arc(e.x,e.y-6+bob,2.5,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle="#fef08a";
    ctx.lineWidth=1.8;
    for(let i=-1;i<=1;i+=2){
      ctx.beginPath();
      ctx.moveTo(e.x+i*9,e.y+18+bob);
      ctx.lineTo(e.x+i*15,e.y+35+bob);
      ctx.lineTo(e.x+i*7,e.y+49+bob);

      ctx.strokeStyle="#0f172a";
      ctx.lineWidth=2.3;
      ctx.beginPath();
      ctx.moveTo(e.x+i*7,e.y+49+bob);
      ctx.lineTo(e.x+i*15,e.y+58+bob);
      ctx.moveTo(e.x+i*7,e.y+49+bob);
      ctx.lineTo(e.x+i*1,e.y+58+bob);
      ctx.stroke();
      ctx.strokeStyle="#fef08a";
      ctx.lineWidth=1.8;

    ctx.shadowBlur=14;
    ctx.shadowColor="#fb923c";
    ctx.fillStyle="#fb923c";

    ctx.lineTo(e.x-6,e.y+15+bob);

  }else{

    const segmentCount=variant==="larva"?6:variant==="armor"?7:8;
    ctx.shadowBlur=22;
    ctx.shadowColor=variant==="armor"?"#facc15":"#fb923c";
    ctx.lineCap="round";
    ctx.lineJoin="round";

    for(let i=0;i<segmentCount;i++){
      const y=e.y-34+i*10;
      const x=e.x+Math.sin(tick+i*.7)*7;

        ctx.lineTo(x+side*(w+23),y+3);
        ctx.stroke();
      }

      ctx.fillStyle=plate;
      ctx.beginPath();
      ctx.ellipse(x,y,w,7.5,0,0,Math.PI*2);
      ctx.fill();
      ctx.strokeStyle="#451a03";
      ctx.lineWidth=1.5;

      ctx.strokeStyle="#fed7aa";
      ctx.lineWidth=1.2;
      ctx.beginPath();
      ctx.moveTo(x-w*.45,y-3);
      ctx.lineTo(x+w*.45,y-3);
      ctx.stroke();
    }

    ctx.shadowBlur=14;
    ctx.shadowColor="#ef4444";
    ctx.fillStyle="#ef4444";
    ctx.beginPath();
    ctx.arc(e.x-7+Math.sin(tick)*4,e.y-37,3.4,0,Math.PI*2);

      ctx.lineWidth=2;
      ctx.beginPath();

      ctx.moveTo(e.x+24,e.y-10);
      ctx.quadraticCurveTo(e.x,e.y+16,e.x-24,e.y+42);
      ctx.stroke();
    }

    ctx.fillStyle="#f97316";
    ctx.beginPath();
    ctx.moveTo(e.x+Math.sin(tick+7)*7,e.y+52);
    ctx.lineTo(e.x+11+Math.sin(tick+7)*7,e.y+37);
    ctx.lineTo(e.x-11+Math.sin(tick+7)*7,e.y+37);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();
  ctx.globalAlpha=1;
}

    ctx.arc(e.x+8,e.y-31,4,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle="#1f1308";
    ctx.lineWidth=6;
    ctx.beginPath();
    ctx.moveTo(e.x,e.y-35);
    ctx.quadraticCurveTo(e.x+24+wave,e.y-62,e.x+4+wave,e.y-86);
    ctx.stroke();
    ctx.fillStyle="#f97316";
    ctx.beginPath();
    ctx.moveTo(e.x+5+wave,e.y-96);
    ctx.lineTo(e.x+20+wave,e.y-78);
    ctx.lineTo(e.x-3+wave,e.y-80);

  }

  ctx.restore();

}

function drawBossSpace(e){
  const rage=e.hp<e.maxHp*.4;
  const pulse=Math.sin(Date.now()/90)*5;

  ctx.shadowBlur=rage?42:30;
  ctx.shadowColor=rage?"#22c55e":"#a78bfa";
  ctx.lineCap="round";
  ctx.lineJoin="round";

  ctx.strokeStyle=rage?"#86efac":"#c084fc";
  ctx.lineWidth=9;
  for(let i=0;i<14;i++){
    const a=i*Math.PI*2/14+Date.now()/1200;
    const r1=45+(i%2)*10;
    const r2=82+(i%3)*10+pulse;
    ctx.beginPath();
    ctx.moveTo(e.x+Math.cos(a)*r1,e.y+Math.sin(a)*r1*.75);
    ctx.lineTo(e.x+Math.cos(a)*r2,e.y+Math.sin(a)*r2*.75);
    ctx.stroke();
    ctx.fillStyle=i%3===0?"#22c55e":rage?"#be123c":"#7e22ce";
    ctx.beginPath();
    ctx.arc(e.x+Math.cos(a)*(r2+7),e.y+Math.sin(a)*(r2+7)*.75,7,0,Math.PI*2);
    ctx.fill();
  }

  const core=ctx.createRadialGradient(e.x,e.y,8,e.x,e.y,58+pulse);
  core.addColorStop(0,rage?"#fef08a":"#f5d0fe");
  core.addColorStop(.45,rage?"#16a34a":"#7e22ce");
  core.addColorStop(1,"#2e1065");
  ctx.fillStyle=core;
  ctx.beginPath();
  ctx.ellipse(e.x,e.y,58+pulse*.35,45,0,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle="#020617";
  ctx.lineWidth=4;
  ctx.beginPath();
  ctx.ellipse(e.x,e.y,41,30,0,0,Math.PI*2);
  ctx.stroke();

  ctx.fillStyle="#f5d0fe";
  ctx.beginPath();
  ctx.arc(e.x-18,e.y-8,11,0,Math.PI*2);
  ctx.arc(e.x+17,e.y-7,10,0,Math.PI*2);
  ctx.arc(e.x,e.y+12,9,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle=rage?"#ef4444":"#020617";
  ctx.beginPath();
  ctx.arc(e.x-17,e.y-7,5,0,Math.PI*2);
  ctx.arc(e.x+18,e.y-6,4.5,0,Math.PI*2);
  ctx.arc(e.x+1,e.y+13,4,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle=rage?"#fef08a":"#22c55e";
  ctx.lineWidth=4;
  ctx.beginPath();
  ctx.arc(e.x,e.y+14,30,0,Math.PI);
  ctx.stroke();
}

function drawBossMoon(e){

  ctx.fillStyle=rage?"#f3f4f6":"#d1d5db";

  ctx.fillStyle="#9ca3af";
  [[-20,-18,9],[18,-16,7],[-6,18,12],[22,16,6]].forEach(c=>{

}

function drawBossDesert(e){
  const rage=e.hp<e.maxHp*.4;
  const tick=Date.now()/180;
  ctx.shadowBlur=rage?46:30;
  ctx.shadowColor=rage?"#ef4444":"#fb923c";
  ctx.lineCap="round";
  ctx.lineJoin="round";

  for(let i=0;i<12;i++){
    const p=i/11;
    const y=e.y-72+i*17;
    const x=e.x+Math.sin(tick+i*.55)*24*(1-p*.35);
    const w=42-i*1.7;
    const h=13+i*.25;
    const plate=ctx.createLinearGradient(x-w,y-h,x+w,y+h);
    plate.addColorStop(0,"#2a1608");
    plate.addColorStop(.45,rage?"#fb923c":"#f59e0b");
    plate.addColorStop(1,"#0f172a");

    ctx.strokeStyle="#0f172a";
    ctx.lineWidth=8;
    for(let side=-1;side<=1;side+=2){
      ctx.beginPath();
      ctx.moveTo(x+side*(w-8),y+3);
      ctx.lineTo(x+side*(w+31),y+15+Math.sin(tick+i)*5);
      ctx.lineTo(x+side*(w+47),y+8);
      ctx.stroke();
    }

    ctx.fillStyle=plate;
    ctx.beginPath();
    ctx.ellipse(x,y,w,h,0,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle=rage?"#fed7aa":"#451a03";
    ctx.lineWidth=2.5;
    ctx.stroke();

    ctx.strokeStyle="#fed7aa";
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(x-w*.42,y-5);
    ctx.lineTo(x+w*.42,y-5);
    ctx.stroke();
  }

  const headX=e.x+Math.sin(tick)*18;
  const headY=e.y-82;
  ctx.fillStyle="#111827";
  ctx.beginPath();
  ctx.ellipse(headX,headY,50,32,0,0,Math.PI*2);
  ctx.fill();

  const head=ctx.createLinearGradient(headX-40,headY-25,headX+42,headY+24);
  head.addColorStop(0,rage?"#fed7aa":"#fde68a");
  head.addColorStop(.45,rage?"#f97316":"#d97706");
  head.addColorStop(1,"#451a03");
  ctx.fillStyle=head;
  ctx.beginPath();
  ctx.moveTo(headX,headY-38);
  ctx.lineTo(headX+38,headY-20);
  ctx.lineTo(headX+52,headY+7);
  ctx.lineTo(headX+22,headY+34);
  ctx.lineTo(headX,headY+24);
  ctx.lineTo(headX-22,headY+34);
  ctx.lineTo(headX-52,headY+7);
  ctx.lineTo(headX-38,headY-20);
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur=18;
  ctx.shadowColor=rage?"#fef08a":"#ef4444";
  ctx.fillStyle=rage?"#fef08a":"#ef4444";
  ctx.beginPath();
  ctx.arc(headX-17,headY-8,6,0,Math.PI*2);
  ctx.arc(headX+17,headY-8,6,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle="#0f172a";
  ctx.lineWidth=12;
  ctx.beginPath();
  ctx.moveTo(headX-36,headY+10);
  ctx.quadraticCurveTo(headX-78,headY+20,headX-108,headY+48);
  ctx.moveTo(headX+36,headY+10);
  ctx.quadraticCurveTo(headX+78,headY+20,headX+108,headY+48);
  ctx.stroke();

  ctx.fillStyle=rage?"#fb923c":"#c87918";
  ctx.beginPath();
  ctx.ellipse(headX-114,headY+50,24,13,-.55,0,Math.PI*2);
  ctx.ellipse(headX+114,headY+50,24,13,.55,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#f97316";
  const tailX=e.x+Math.sin(tick+11*.55)*14;
  ctx.beginPath();
  ctx.moveTo(tailX,e.y+142);
  ctx.lineTo(tailX+21,e.y+106);
  ctx.lineTo(tailX-21,e.y+106);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur=0;
}

function drawHp(e){
  ctx.fillStyle="#fff7ed";
  const width=e.maxHp*6;
  for(let i=0;i<e.hp;i++){
    ctx.fillRect(e.x-width/2+i*6,e.y+e.h*.33,4,5);
  }
}

function drawItem(it){
  ctx.save();
  ctx.translate(it.x,it.y);
  const color=
    it.type==="invincible"?"#facc15":
    it.type==="shot3"?"#a78bfa":
    it.type==="spread"?"#fb923c":
    it.type==="down"?"#ef4444":
    it.type==="bomb"?"#22c55e":"#38bdf8";

  if(it.sealed){
    const pulse=.75+Math.sin(Date.now()/120)*.25;
    ctx.shadowBlur=20+pulse*10;
    ctx.shadowColor=color;

    const glass=ctx.createLinearGradient(-17,-18,17,18);
    glass.addColorStop(0,"rgba(224,242,254,.95)");
    glass.addColorStop(.45,"rgba(96,165,250,.45)");
    glass.addColorStop(1,"rgba(15,23,42,.75)");
    ctx.fillStyle=glass;
    ctx.strokeStyle=color;
    ctx.lineWidth=3;
    ctx.beginPath();
    roundedRectPath(-18,-15,36,30,14);
    ctx.fill();
    ctx.stroke();

    ctx.globalAlpha=.35;
    ctx.fillStyle="#ffffff";
    ctx.beginPath();
    ctx.ellipse(-6,-7,9,4,-.45,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;

    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.moveTo(0,-9);
    ctx.lineTo(8,0);
    ctx.lineTo(0,9);
    ctx.lineTo(-8,0);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur=0;
    ctx.fillStyle="#020617";
    ctx.font="bold 10px sans-serif";
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    const capsuleLabel=
      it.type==="invincible"?"*":
      it.type==="shot3"?"3":
      it.type==="spread"?"R":
      it.type==="down"?"1":
      it.type==="bomb"?"B":"2";
    ctx.fillText(capsuleLabel,0,1);
    ctx.restore();
    return;
  }

  ctx.rotate(Date.now()/220);
  if(it.openFlash>0){
    ctx.globalAlpha=.55;
    ctx.strokeStyle="#ffffff";
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(0,0,22-it.openFlash*.6,0,Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha=1;
    it.openFlash--;
  }

  ctx.shadowBlur=18;
  ctx.shadowColor=color;
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(0,-14);
  ctx.lineTo(12,0);
  ctx.lineTo(0,14);
  ctx.lineTo(-12,0);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle="#020617";
  ctx.font="bold 12px sans-serif";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  const label=
    it.type==="invincible"?"*":
    it.type==="shot3"?"3":
    it.type==="spread"?"R":
    it.type==="down"?"1":
    it.type==="bomb"?"B":"2";
  ctx.fillText(label,0,1);
  ctx.restore();
}

function drawBossHP(){
  const boss=enemies.find(e=>e.type==="boss");
  if(!boss)return;

  const barWidth=W*.62,barHeight=12,x=(W-barWidth)/2,y=70;

  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.font="bold 14px sans-serif";
  ctx.shadowBlur=bossRage?16:8;
  ctx.shadowColor=bossRage?"#f97316":"#ef4444";
  ctx.fillStyle=bossRage?"#fed7aa":"#fee2e2";
  ctx.fillText(boss.name||BOSS_NAMES[boss.stage]||"BOSS",W/2,y-17);
  ctx.shadowBlur=0;

  ctx.fillStyle="rgba(15,23,42,.75)";
  ctx.fillRect(x,y,barWidth,barHeight);

  ctx.fillStyle=bossRage?"#f97316":"#ef4444";
  ctx.fillRect(x,y,barWidth*(boss.hp/boss.maxHp),barHeight);

  ctx.strokeStyle="#fff";
  ctx.strokeRect(x,y,barWidth,barHeight);
}

function drawShockwaves(){
  const now=performance.now();
  shockwaves=shockwaves.filter(w=>now-w.born<w.duration);

  shockwaves.forEach(w=>{
    if(now<w.born)return;
    const p=(now-w.born)/w.duration;
    const r=40+p*Math.max(W,H)*.55;

    ctx.save();
    ctx.globalAlpha=(1-p)*.7;
    ctx.strokeStyle="#facc15";
    ctx.lineWidth=5-p*3;
    ctx.shadowBlur=24;
    ctx.shadowColor="#ef4444";
    ctx.beginPath();
    ctx.arc(w.x,w.y,r,0,Math.PI*2);
    ctx.stroke();
    ctx.restore();
  });
}

function drawBossEntranceEffect(){
  if(!bossEntrance)return;

  const now=performance.now();
  if(now>bossEntrance.until){
    bossEntrance=null;
    return;
  }

  const boss=enemies.find(e=>e.type==="boss");
  const x=boss?boss.x:W/2;
  const y=boss&&boss.y>-45?boss.y:H*.26;
  const age=(now-bossEntrance.born)/1000;
  const fade=Math.min(1,(bossEntrance.until-now)/900);
  const stage=bossEntrance.stage;

  ctx.save();
  ctx.globalAlpha=fade;

  if(stage===0){
    ctx.strokeStyle="#c4b5fd";
    ctx.fillStyle="#fef08a";
    ctx.shadowBlur=18;
    ctx.shadowColor="#a78bfa";
    for(let i=0;i<22;i++){
      const a=i*.9+age*5;
      const r=42+(i%5)*12+Math.sin(age*4+i)*10;
      const px=x+Math.cos(a)*r;
      const py=y+Math.sin(a*.8)*r*.55;
      ctx.beginPath();
      ctx.moveTo(px-5,py);
      ctx.lineTo(px+5,py);
      ctx.moveTo(px,py-5);
      ctx.lineTo(px,py+5);
      ctx.stroke();
      if(i%4===0){
        ctx.beginPath();
        ctx.arc(px,py,2.5,0,Math.PI*2);
        ctx.fill();
      }
    }
  }else if(stage===1||stage===2){
    const cloudColor=stage===1?"rgba(126,34,206,.34)":"rgba(107,114,128,.38)";
    const glowColor=stage===1?"#c084fc":"#cbd5e1";
    ctx.shadowBlur=24;
    ctx.shadowColor=glowColor;
    for(let i=0;i<18;i++){
      const a=i*Math.PI*2/18+age*.65;
      const r=40+(i%4)*13+Math.sin(age*2+i)*7;
      const px=x+Math.cos(a)*r;
      const py=y+Math.sin(a)*r*.5;
      ctx.fillStyle=cloudColor;
      ctx.beginPath();
      ctx.ellipse(px,py,25+(i%3)*8,14+(i%2)*7,age*.2+a,0,Math.PI*2);
      ctx.fill();
    }
    if(stage===2){
      ctx.strokeStyle="#fef08a";
      ctx.lineWidth=3;
      for(let i=-1;i<=1;i++){
        const bx=x+i*34+Math.sin(age*8+i)*10;
        ctx.beginPath();
        ctx.moveTo(bx,y-42);
        ctx.lineTo(bx+10,y-16);
        ctx.lineTo(bx-5,y+10);
        ctx.lineTo(bx+13,y+36);
        ctx.stroke();
      }
    }
  }else{
    ctx.strokeStyle="rgba(254,215,170,.65)";
    ctx.fillStyle="rgba(251,146,60,.28)";
    ctx.shadowBlur=18;
    ctx.shadowColor="#fb923c";
    for(let i=0;i<28;i++){
      const a=i*.55+age*5.2;
      const r=22+i*3.8;
      const px=x+Math.cos(a)*r;
      const py=y+Math.sin(a)*r*.38+i*.4;
      ctx.beginPath();
      ctx.arc(px,py,3+(i%4),0,Math.PI*2);
      ctx.fill();
    }
    ctx.lineWidth=5;
    for(let i=0;i<3;i++){
      ctx.beginPath();
      ctx.ellipse(x,y+8,54+i*18,22+i*8,age*1.2+i,0,Math.PI*2);
      ctx.stroke();
    }
  }

  ctx.restore();
}

function drawClearBanner(){
  if(!clearBanner||performance.now()>clearBanner.until)return;

  const remain=clearBanner.until-performance.now();
  const fade=Math.min(1,remain/450);
  const y=H*.36;

  ctx.save();
  ctx.globalAlpha=fade;
  ctx.textAlign="center";
  ctx.textBaseline="middle";

  ctx.fillStyle="rgba(2,6,23,.46)";
  ctx.fillRect(0,y-70,W,150);

  ctx.shadowBlur=26;
  ctx.shadowColor="#facc15";
  ctx.fillStyle="#fef08a";
  ctx.font="bold 42px sans-serif";
  ctx.fillText("STAGE CLEAR",W/2,y-22);

  ctx.shadowBlur=14;
  ctx.shadowColor="#38bdf8";
  ctx.fillStyle="#e0f2fe";
  ctx.font="bold 17px sans-serif";
  ctx.fillText(clearBanner.boss+" DESTROYED",W/2,y+24);

  ctx.shadowBlur=0;
  ctx.fillStyle="#bae6fd";
  ctx.font="14px sans-serif";
  ctx.fillText("NEXT: "+clearBanner.next,W/2,y+52);
  ctx.restore();
}

function dangerEffect(){
  if(state!=="play")return;
  let danger=false;
  enemyBullets.forEach(b=>{
    const dx=b.x-player.x;
    const dy=b.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<80)danger=true;
  });
  if(danger){
    ctx.fillStyle="rgba(255,0,0,0.08)";
    ctx.fillRect(0,0,W,H);
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);

  ctx.save();
  if(shake>0){
    ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
    shake*=.86;
    if(shake<.5)shake=0;
  }

  drawBackground();

  if(performance.now()<bossIntro){
    ctx.fillStyle="rgba(0,0,0,.7)";
    ctx.fillRect(0,0,W,H);
  }
  drawShockwaves();
  drawBossEntranceEffect();

  bullets.forEach(b=>{
    ctx.shadowBlur=10;
    ctx.shadowColor=b.type==="bomb"?"#22c55e":b.type==="spread"?"#fb923c":"#fde047";
    ctx.fillStyle=ctx.shadowColor;
    if(b.type==="bomb"){
      ctx.beginPath();
      ctx.ellipse(b.x,b.y,7,11,0,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle="#bbf7d0";
      ctx.fillRect(b.x-2,b.y-13,4,7);
    }else if(b.type==="spread"){
      ctx.fillRect(b.x-2,b.y-7,4,14);
    }else{
      ctx.fillRect(b.x-2,b.y-8,4,16);
    }
    ctx.shadowBlur=0;
  });

  enemyBullets.forEach(b=>{
    ctx.shadowBlur=10;
    ctx.shadowColor="#ef4444";
    ctx.fillStyle="#ef4444";
    ctx.fillRect(b.x-4,b.y-7,8,14);
    ctx.shadowBlur=0;
  });

  items.forEach(drawItem);
  enemies.forEach(drawEnemy);

  booms.forEach(p=>{
    ctx.globalAlpha=p.life/34;
    ctx.fillStyle=Math.random()>.5?"#facc15":"#fb923c";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  });

  if(state==="play")drawTrail();
  if(state==="play")drawPlayer();
  drawBossHP();
  drawClearBanner();
  ctx.restore();

  dangerEffect();

  if(damageFlash>0){
    ctx.fillStyle=`rgba(255,0,0,${damageFlash*.35})`;
    ctx.fillRect(0,0,W,H);
    damageFlash*=.85;
    if(damageFlash<.02)damageFlash=0;
  }
}

function loop(t){
  update(t);
  draw();
  requestAnimationFrame(loop);
}

function handleTouch(e){
  e.preventDefault();
  unlockAudio();
  const touch=e.touches[0];

  if(state==="ready"){
    startGame();
  }else if(state==="over"){
    return;
  }

  movePlayer(touch.clientX,touch.clientY);
}

canvas.addEventListener("touchstart",handleTouch,{passive:false});
canvas.addEventListener("touchmove",handleTouch,{passive:false});

canvas.addEventListener("mousedown",e=>{
  unlockAudio();
  if(state==="ready")startGame();
  if(state==="over")return;
  movePlayer(e.clientX,e.clientY);
});

canvas.addEventListener("mousemove",e=>{
  if(e.buttons===1)movePlayer(e.clientX,e.clientY);
});

title.addEventListener("touchstart",e=>{
  e.preventDefault();
  unlockAudio();
  startGame();
},{passive:false});

title.addEventListener("click",()=>{
  unlockAudio();
  startGame();
});

msg.addEventListener("click",e=>{
  const action=e.target.dataset.action;
  if(!action)return;
  unlockAudio();
  if(action==="restart")startGame();
  if(action==="continue")continueGame();
});

resetVars();
state="ready";
loop();
</script>
</body>
</html>
