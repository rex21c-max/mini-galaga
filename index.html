<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mini Galaga v4</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#050814;touch-action:none;}
canvas{display:block;background:#020617;}
#ui{position:fixed;top:10px;left:10px;color:#e0f2fe;font:16px sans-serif;text-shadow:0 0 8px #38bdf8;z-index:2}
#msg{position:fixed;top:38%;left:0;right:0;text-align:center;color:white;font:28px sans-serif;text-shadow:0 0 16px #60a5fa;z-index:3}
#msg small{font-size:15px;opacity:.85}
</style>
</head>
<body>
<div id="ui">Score: <span id="score">0</span> / Life: <span id="life">3</span> / Best: <span id="best">0</span></div>
<div id="msg">MINI GALAGA v3<br><small>Touch the screen to start</small></div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const scoreEl=document.getElementById("score");
const lifeEl=document.getElementById("life");
const bestEl=document.getElementById("best");
const msg=document.getElementById("msg");

let W,H,player,bullets,enemies,booms,score,life,state,startTime,elapsed,bgIndex,highScore;
let lastShot=0,timer=0,lastDifficultyAt=0,nextBossAt=60000,enemySpeed=1;
const stars=[];
const MAX_ENEMY_SPEED=1.8;
const START_ENEMY_SPEED=0.8;
const BG_NAMES=["Space","Moon","Earth","Desert"];

const audio={
  ctx:null,
  master:null,
  musicTimer:null,
  step:0,
  started:false,
  melody:[523,0,659,784,0,659,587,0,523,784,880,784,659,0,587,0],
  bass:[131,131,196,196,147,147,220,196]
};

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
  seedStars();
  clampPlayer();
}
resize();
addEventListener("resize",resize);

function seedStars(){
  stars.length=0;
  for(let i=0;i<130;i++){
    stars.push({
      x:Math.random()*W,
      y:Math.random()*H,
      r:Math.random()*1.8+.4,
      s:Math.random()*1.8+.35,
      a:Math.random()*.65+.25
    });
  }
}

function clamp(v,min,max){
  return Math.max(min,Math.min(max,v));
}

function clampPlayer(){
  if(!player)return;
  player.x=clamp(player.x,25,W-25);
  player.y=clamp(player.y,30,H-38);
}

function reset(){
  player={x:W/2,y:H-80,w:38,h:48};
  bullets=[];
  enemies=[];
  booms=[];
  score=0;
  life=3;
  elapsed=0;
  bgIndex=0;
  enemySpeed=START_ENEMY_SPEED;
  lastDifficultyAt=0;
  nextBossAt=60000;
  timer=0;
  lastShot=0;
  highScore=Number(localStorage.getItem("miniGalagaHighScore") || 0);
  state="ready";
  updateUI();
  msg.innerHTML="MINI GALAGA v3<br><small>Touch the screen to start</small>";
  msg.style.display="block";
}

function start(){
  if(state==="ready" || state==="over"){
    player={x:W/2,y:H-80,w:38,h:48};
    bullets=[];
    enemies=[];
    booms=[];
    score=0;
    life=3;
    elapsed=0;
    bgIndex=0;
    enemySpeed=START_ENEMY_SPEED;
    lastDifficultyAt=0;
    nextBossAt=60000;
    timer=0;
    lastShot=0;
    startTime=performance.now();
    state="play";
    msg.style.display="none";
    updateUI();
    startMusic();
  }
}

function updateUI(){
  scoreEl.textContent=score;
  lifeEl.textContent=life;
  bestEl.textContent=highScore;
}

function initAudio(){
  if(audio.started)return;
  const AudioContext=window.AudioContext || window.webkitAudioContext;
  if(!AudioContext)return;
  audio.ctx=new AudioContext();
  audio.master=audio.ctx.createGain();
  audio.master.gain.value=.12;
  audio.master.connect(audio.ctx.destination);
  audio.started=true;
}

function unlockAudio(){
  initAudio();
  if(audio.ctx && audio.ctx.state==="suspended")audio.ctx.resume();
}

function playTone(freq,duration,type,volume,delay){
  if(!audio.started || !audio.ctx || !freq)return;
  const now=audio.ctx.currentTime+(delay || 0);
  const osc=audio.ctx.createOscillator();
  const gain=audio.ctx.createGain();
  osc.type=type || "square";
  osc.frequency.setValueAtTime(freq,now);
  gain.gain.setValueAtTime(0,now);
  gain.gain.linearRampToValueAtTime(volume,now+.01);
  gain.gain.exponentialRampToValueAtTime(.001,now+duration);
  osc.connect(gain);
  gain.connect(audio.master);
  osc.start(now);
  osc.stop(now+duration+.03);
}

function playNoise(duration,volume,delay){
  if(!audio.started || !audio.ctx)return;
  const now=audio.ctx.currentTime+(delay || 0);
  const buffer=audio.ctx.createBuffer(1,audio.ctx.sampleRate*duration,audio.ctx.sampleRate);
  const data=buffer.getChannelData(0);
  const source=audio.ctx.createBufferSource();
  const gain=audio.ctx.createGain();
  const filter=audio.ctx.createBiquadFilter();
  for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*(1-i/data.length);
  filter.type="highpass";
  filter.frequency.value=900;
  gain.gain.setValueAtTime(volume,now);
  gain.gain.exponentialRampToValueAtTime(.001,now+duration);
  source.buffer=buffer;
  source.connect(filter);
  filter.connect(gain);
  gain.connect(audio.master);
  source.start(now);
}

function startMusic(){
  if(!audio.started || audio.musicTimer)return;
  audio.musicTimer=setInterval(()=>{
    if(state!=="play")return;
    const note=audio.melody[audio.step%audio.melody.length];
    const bass=audio.bass[Math.floor(audio.step/4)%audio.bass.length];
    audio.step++;
    if(note)playTone(note,.08,"square",.032);
    if(audio.step%2===0 && note)playTone(note*1.5,.045,"triangle",.018,.055);
    if(audio.step%4===1)playTone(bass,.14,"triangle",.04);
    if(audio.step%8===5)playNoise(.035,.025);
  },125);
}

function playShootSound(){
  playTone(980,.04,"square",.08);
  playTone(1480,.03,"triangle",.05,.025);
}

function playBoomSound(){
  playTone(180,.12,"sawtooth",.08);
  playTone(90,.18,"square",.055,.05);
  playNoise(.14,.08);
}

function playGameOverSound(){
  playTone(330,.18,"square",.09);
  playTone(220,.22,"square",.08,.16);
  playTone(110,.35,"sawtooth",.08,.34);
}

function drawPlayer(){
  const g=ctx.createLinearGradient(player.x,player.y-32,player.x,player.y+34);
  g.addColorStop(0,"#dbeafe");
  g.addColorStop(.45,"#38bdf8");
  g.addColorStop(1,"#1d4ed8");
  ctx.shadowBlur=18;
  ctx.shadowColor="#38bdf8";
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(player.x,player.y-32);
  ctx.lineTo(player.x+12,player.y+8);
  ctx.lineTo(player.x+30,player.y+25);
  ctx.lineTo(player.x+9,player.y+19);
  ctx.lineTo(player.x+4,player.y+31);
  ctx.lineTo(player.x,player.y+22);
  ctx.lineTo(player.x-4,player.y+31);
  ctx.lineTo(player.x-9,player.y+19);
  ctx.lineTo(player.x-30,player.y+25);
  ctx.lineTo(player.x-12,player.y+8);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle="#e0f2fe";
  ctx.beginPath();
  ctx.ellipse(player.x,player.y-9,6,12,0,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle="#0f172a";
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(player.x-15,player.y+14);
  ctx.lineTo(player.x+15,player.y+14);
  ctx.stroke();
  ctx.fillStyle="#facc15";
  ctx.beginPath();
  ctx.moveTo(player.x,player.y+42);
  ctx.lineTo(player.x+8,player.y+23);
  ctx.lineTo(player.x-8,player.y+23);
  ctx.closePath();
  ctx.fill();
}

function drawEnemy(e){
  const boss=e.type==="boss";
  ctx.fillStyle=boss ? "#a78bfa" : "#fb7185";
  ctx.shadowBlur=boss ? 18 : 0;
  ctx.shadowColor="#c4b5fd";
  ctx.beginPath();
  ctx.moveTo(e.x,e.y+e.h/2);
  ctx.lineTo(e.x+e.w/2,e.y-e.h/2);
  ctx.lineTo(e.x+e.w*.12,e.y-e.h*.22);
  ctx.lineTo(e.x,e.y-e.h*.38);
  ctx.lineTo(e.x-e.w*.12,e.y-e.h*.22);
  ctx.lineTo(e.x-e.w/2,e.y-e.h/2);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle=boss ? "#ede9fe" : "#fecdd3";
  ctx.fillRect(e.x-e.w*.24,e.y-2,e.w*.48,5);
  if(boss){
    ctx.fillStyle="#fef08a";
    for(let i=0;i<e.hp;i++)ctx.fillRect(e.x-18+i*13,e.y+18,8,5);
  }
}

function hit(a,b){
  return a.x-a.w/2<b.x+b.w/2 &&
         a.x+a.w/2>b.x-b.w/2 &&
         a.y-a.h/2<b.y+b.h/2 &&
         a.y+a.h/2>b.y-b.h/2;
}

function shoot(t){
  if(t-lastShot>210){
    bullets.push({x:player.x-9,y:player.y-35,w:5,h:15,s:9});
    bullets.push({x:player.x+9,y:player.y-35,w:5,h:15,s:9});
    lastShot=t;
    playShootSound();
  }
}

function spawn(){
  let level=Math.floor(score/100);
  enemies.push({
    x:30+Math.random()*(W-60),
    y:-30,
    w:42,
    h:36,
    s:(2.2+Math.random()*2+level*.25)*enemySpeed,
    type:"normal",
    hp:1
  });
}

function spawnBoss(){
  enemies.push({
    x:60+Math.random()*(W-120),
    y:-60,
    w:78,
    h:68,
    s:Math.min(2.6,1.55*enemySpeed),
    type:"boss",
    hp:3
  });
}

function boom(x,y){
  for(let i=0;i<10;i++){
    booms.push({
      x:x,
      y:y,
      vx:(Math.random()-.5)*5,
      vy:(Math.random()-.5)*5,
      r:2+Math.random()*3,
      life:22
    });
  }
}

function end(){
  state="over";
  if(score>highScore){
    highScore=score;
    localStorage.setItem("miniGalagaHighScore",String(highScore));
  }
  updateUI();
  playGameOverSound();
  msg.innerHTML="GAME OVER<br><small>Score: "+score+" / Best: "+highScore+"<br>Touch to restart</small>";
  msg.style.display="block";
}

function update(t){
  if(state!=="play")return;

  elapsed=t-startTime;

  while(elapsed-lastDifficultyAt>=30000){
    enemySpeed=Math.min(MAX_ENEMY_SPEED,enemySpeed*1.03);
    lastDifficultyAt+=30000;
  }

  while(elapsed>=nextBossAt){
    spawnBoss();
    nextBossAt+=60000;
  }

  shoot(t);

  timer++;
  let spawnGap=Math.max(16,35-Math.floor(score/80));
  if(timer>spawnGap){
    spawn();
    timer=0;
  }

  bullets.forEach(b=>b.y-=b.s);
  bullets=bullets.filter(b=>b.y>-20);
  enemies.forEach(e=>e.y+=e.s);

  booms.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
  });
  booms=booms.filter(p=>p.life>0);

  for(let i=enemies.length-1;i>=0;i--){
    let e=enemies[i];

    if(hit(player,e)){
      boom(e.x,e.y);
      playBoomSound();
      enemies.splice(i,1);
      life--;
      updateUI();
      if(life<=0)end();
      continue;
    }

    if(e.y>H+40){
      enemies.splice(i,1);
      life--;
      updateUI();
      if(life<=0)end();
      continue;
    }

    for(let j=bullets.length-1;j>=0;j--){
      let b=bullets[j];
      if(hit(b,e)){
        bullets.splice(j,1);
        e.hp--;
        if(e.hp>0)continue;
        enemies.splice(i,1);
        boom(e.x,e.y);
        playBoomSound();

        if(e.type==="boss"){
          score+=50;
          life=Math.min(life+1,5);
          bgIndex=(bgIndex+1)%BG_NAMES.length;
        }else{
          score+=10;
        }

        updateUI();
        break;
      }
    }
  }
}

function drawBackground(){
  const t=Date.now();
  const bg=ctx.createLinearGradient(0,0,0,H);

  if(bgIndex===1){
    bg.addColorStop(0,"#111827");
    bg.addColorStop(.6,"#374151");
    bg.addColorStop(1,"#0f172a");
  }else if(bgIndex===2){
    bg.addColorStop(0,"#38bdf8");
    bg.addColorStop(.55,"#7dd3fc");
    bg.addColorStop(1,"#dcfce7");
  }else if(bgIndex===3){
    bg.addColorStop(0,"#fbbf24");
    bg.addColorStop(.58,"#fb923c");
    bg.addColorStop(1,"#7c2d12");
  }else{
    bg.addColorStop(0,"#070421");
    bg.addColorStop(.45,"#061329");
    bg.addColorStop(1,"#020617");
  }

  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);

  if(bgIndex<2){
    stars.forEach(star=>{
      const y=(star.y+t/28*star.s)%H;
      ctx.globalAlpha=star.a;
      ctx.fillStyle="#e0f2fe";
      ctx.fillRect(star.x,y,star.r,star.r);
    });
    ctx.globalAlpha=1;
  }

  ctx.fillStyle="rgba(15,23,42,.42)";
  ctx.fillRect(8,34,120,22);
  ctx.fillStyle="#e0f2fe";
  ctx.font="13px sans-serif";
  ctx.fillText("BG: "+BG_NAMES[bgIndex],16,50);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawBackground();

  bullets.forEach(b=>{
    ctx.fillStyle="#fde047";
    ctx.fillRect(b.x-2,b.y-8,4,16);
  });

  enemies.forEach(drawEnemy);

  booms.forEach(p=>{
    ctx.globalAlpha=p.life/22;
    ctx.fillStyle="#facc15";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  });

  drawPlayer();
}

function loop(t){
  update(t);
  draw();
  requestAnimationFrame(loop);
}

function move(x,y){
  if(!player)return;
  player.x=clamp(x,25,W-25);
  player.y=clamp(y,30,H-38);
}

function handleTouch(e){
  e.preventDefault();
  unlockAudio();
  start();
  move(e.touches[0].clientX,e.touches[0].clientY);
}

canvas.addEventListener("touchstart",handleTouch,{passive:false});
canvas.addEventListener("touchmove",handleTouch,{passive:false});

canvas.addEventListener("mousedown",e=>{
  unlockAudio();
  start();
  move(e.clientX,e.clientY);
});

canvas.addEventListener("mousemove",e=>{
  if(e.buttons===1)move(e.clientX,e.clientY);
});

reset();
loop();
</script>
</body>
</html>
