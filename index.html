<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mini Galaxia</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#020617;touch-action:none;}
canvas{display:block;background:#020617;}
#ui{position:fixed;top:10px;left:10px;color:#e0f2fe;font:16px sans-serif;text-shadow:0 0 8px #38bdf8;z-index:2}
#title{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#020617;z-index:10}
#title h1{font-size:46px;color:#38bdf8;text-shadow:0 0 20px #38bdf8;animation:float 2s infinite}
#title p{color:white;font-size:18px;animation:blink 1s infinite}
#warning{position:fixed;top:32%;left:0;right:0;text-align:center;color:#facc15;font:42px sans-serif;font-weight:bold;text-shadow:0 0 18px #ef4444;z-index:4;display:none}
#msg{position:fixed;top:42%;left:0;right:0;text-align:center;color:white;font:26px sans-serif;text-shadow:0 0 12px #60a5fa;z-index:5;display:none}
@keyframes blink{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-10px)}100%{transform:translateY(0)}}
</style>
</head>

<body>
<div id="title">
  <h1>MINI GALAXIA</h1>
  <p>TAP TO START</p>
</div>

<div id="ui">
Score: <span id="score">0</span> /
Life: <span id="life">3</span> /
Best: <span id="best">0</span> /
Shot: <span id="shot">1</span>
</div>

<div id="warning">WARNING</div>
<div id="msg"></div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const title=document.getElementById("title");
const warningEl=document.getElementById("warning");
const msg=document.getElementById("msg");
const scoreEl=document.getElementById("score");
const lifeEl=document.getElementById("life");
const bestEl=document.getElementById("best");
const shotEl=document.getElementById("shot");

let W,H;
let player,bullets,enemies,enemyBullets,items,booms,stars;
let score,life,best,shotLevel,state,startTime,enemySpeed,nextBossAt,bossCount,lastShot,lastDifficultyAt,invincibleUntil;
let shake=0;
let bgIndex=0;

const START_ENEMY_SPEED=.9;
const MAX_ENEMY_SPEED=2.6;
const BG_NAMES=["Space","Moon","Earth","Desert"];

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
  makeStars();
}
addEventListener("resize",resize);
resize();

function makeStars(){
  stars=[];
  for(let i=0;i<120;i++){
    stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+.5,s:Math.random()*1.5+.4});
  }
}

function resetVars(){
  player={x:W/2,y:H-80,w:38,h:48};
  bullets=[];
  enemies=[];
  enemyBullets=[];
  items=[];
  booms=[];
  score=0;
  life=3;
  shotLevel=1;
  enemySpeed=START_ENEMY_SPEED;
  nextBossAt=30000;
  bossCount=0;
  lastShot=0;
  lastDifficultyAt=0;
  invincibleUntil=0;
  bgIndex=0;
  best=Number(localStorage.getItem("miniGalaxiaBest")||0);
  update.enemyTimer=0;
  updateUI();
}

function updateUI(){
  scoreEl.textContent=score;
  lifeEl.textContent=life;
  bestEl.textContent=best;
  shotEl.textContent=shotLevel;
}

function startGame(){
  resetVars();
  startTime=performance.now();
  state="play";
  title.style.display="none";
  msg.style.display="none";
}

function gameOver(){
  state="over";
  if(score>best){
    best=score;
    localStorage.setItem("miniGalaxiaBest",String(best));
  }
  updateUI();
  msg.innerHTML="GAME OVER<br><small>Score: "+score+" / Best: "+best+"<br>Touch to restart</small>";
  msg.style.display="block";
}

function showWarning(text){
  warningEl.textContent=text;
  warningEl.style.display="block";
  shake=16;
  setTimeout(()=>warningEl.style.display="none",1100);
}

function clamp(v,min,max){return Math.max(min,Math.min(max,v));}

function movePlayer(x,y){
  if(!player)return;
  player.x=clamp(x,25,W-25);
  player.y=clamp(y,35,H-40);
}

function shoot(t){
  if(t-lastShot<210)return;

  if(shotLevel===1){
    bullets.push({x:player.x,y:player.y-35,w:5,h:15,s:9});
  }else if(shotLevel===2){
    bullets.push({x:player.x-9,y:player.y-35,w:5,h:15,s:9});
    bullets.push({x:player.x+9,y:player.y-35,w:5,h:15,s:9});
  }else{
    bullets.push({x:player.x,y:player.y-38,w:5,h:15,s:9});
    bullets.push({x:player.x-15,y:player.y-32,w:5,h:15,s:9});
    bullets.push({x:player.x+15,y:player.y-32,w:5,h:15,s:9});
  }

  lastShot=t;
}

function hasBoss(){
  return enemies.some(e=>e.type==="midboss"||e.type==="boss");
}

function spawnEnemy(){
  let type="normal";

  if(bgIndex>=1 && Math.random()<0.2){
    if(bgIndex===1) type="curve";
    else if(bgIndex===2) type="split";
    else if(bgIndex===3) type="follow";
  }

  enemies.push({
    x:30+Math.random()*(W-60),
    y:-40,
    w:42,
    h:36,
    s:(2.2+Math.random()*1.7)*enemySpeed,
    type,
    hp:1,
    maxHp:1,
    angle:Math.random()*Math.PI*2
  });
}

function spawnMidBoss(){
  showWarning("MID BOSS");
  enemies.push({
    x:60+Math.random()*(W-120),
    y:-70,
    w:78,
    h:68,
    s:1.45*enemySpeed,
    type:"midboss",
    hp:3,
    maxHp:3
  });
}

function spawnBoss(){
  showWarning("WARNING");
  const bossHp=bgIndex===0 ? 8 : 13;
  enemies.push({
    x:W/2,
    y:-90,
    w:112,
    h:94,
    s:1,
    vx:1.2,
    type:"boss",
    hp:bossHp,
    maxHp:bossHp,
    stage:bgIndex,
    shotTimer:0
  });
}

function bossShoot(e,t){
  if(t-e.shotTimer<1200)return;
  e.shotTimer=t;

  if(e.stage===0){
    enemyBullets.push({x:e.x,y:e.y+30,w:8,h:14,vx:0,vy:4.2});
    enemyBullets.push({x:e.x-24,y:e.y+25,w:8,h:14,vx:-1,vy:4});
    enemyBullets.push({x:e.x+24,y:e.y+25,w:8,h:14,vx:1,vy:4});
  }else if(e.stage===1){
    for(let i=-2;i<=2;i++){
      enemyBullets.push({x:e.x,y:e.y+30,w:8,h:14,vx:i*1.25,vy:3.6});
    }
  }else if(e.stage===2){
    enemyBullets.push({x:e.x,y:e.y+30,w:8,h:14,vx:0,vy:6});
    enemyBullets.push({x:e.x-18,y:e.y+25,w:8,h:14,vx:0,vy:5.6});
    enemyBullets.push({x:e.x+18,y:e.y+25,w:8,h:14,vx:0,vy:5.6});
  }else{
    for(let i=-1;i<=1;i++){
      enemyBullets.push({x:e.x,y:e.y+30,w:8,h:14,vx:i*1.8,vy:3.8,curve:.045*i});
    }
  }
}

function dropItem(x,y,type){
  items.push({x,y,w:28,h:28,s:2.2,type});
}

function boom(x,y,big=false){
  const count=big?34:18;
  for(let i=0;i<count;i++){
    booms.push({
      x,y,
      vx:(Math.random()-.5)*(big?8:5),
      vy:(Math.random()-.5)*(big?8:5),
      r:2+Math.random()*(big?5:3),
      life:big?34:24
    });
  }
}

function splitEnemy(e){
  for(let k=-1;k<=1;k+=2){
    enemies.push({
      x:e.x+k*14,
      y:e.y,
      w:28,
      h:24,
      s:e.s+0.4,
      type:"normal",
      hp:1,
      maxHp:1,
      angle:0
    });
  }
}

function hit(a,b){
  return a.x-a.w/2<b.x+b.w/2 &&
         a.x+a.w/2>b.x-b.w/2 &&
         a.y-a.h/2<b.y+b.h/2 &&
         a.y+a.h/2>b.y-b.h/2;
}

function update(t){
  if(state!=="play")return;

  const elapsed=t-startTime;

  while(elapsed-lastDifficultyAt>=30000){
    enemySpeed=Math.min(MAX_ENEMY_SPEED,enemySpeed*1.03);
    lastDifficultyAt+=30000;
  }

  while(elapsed>=nextBossAt){
    bossCount++;
    if(bossCount%2===1)spawnMidBoss();
    else spawnBoss();
    nextBossAt+=30000;
  }

  shoot(t);

  update.enemyTimer++;
  let gap=Math.max(16,36-Math.floor(score/100));
  if(hasBoss())gap*=4;

  if(update.enemyTimer>gap){
    spawnEnemy();
    update.enemyTimer=0;
  }

  bullets.forEach(b=>b.y-=b.s);
  bullets=bullets.filter(b=>b.y>-30);

  enemyBullets.forEach(b=>{
    b.x+=b.vx;
    if(b.curve)b.vx+=b.curve;
    b.y+=b.vy;
  });
  enemyBullets=enemyBullets.filter(b=>b.y<H+30&&b.x>-50&&b.x<W+50);

  enemies.forEach(e=>{
    if(e.type==="boss"){
      if(e.y<90)e.y+=1.1;
      else{
        e.x+=e.vx;
        if(e.x<65||e.x>W-65)e.vx*=-1;
      }
      bossShoot(e,t);
    }else if(e.type==="curve"){
      e.y+=e.s;
      e.x+=Math.sin(e.angle)*3;
      e.angle+=0.1;
    }else if(e.type==="follow"){
      e.y+=e.s;
      e.x+=(player.x-e.x)*0.02;
    }else{
      e.y+=e.s;
    }
  });

  items.forEach(it=>it.y+=it.s);
  items=items.filter(it=>it.y<H+40);

  booms.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
  booms=booms.filter(p=>p.life>0);

  const invincible=t<invincibleUntil;

  for(let i=enemyBullets.length-1;i>=0;i--){
    if(hit(player,enemyBullets[i])){
      enemyBullets.splice(i,1);
      if(!invincible){
        life--;
        shake=12;
        updateUI();
        if(life<=0)gameOver();
      }
    }
  }

  for(let i=items.length-1;i>=0;i--){
    if(hit(player,items[i])){
      const it=items[i];
      if(it.type==="shot2")shotLevel=Math.max(shotLevel,2);
      if(it.type==="shot3")shotLevel=3;
      if(it.type==="invincible")invincibleUntil=t+5000;
      items.splice(i,1);
      updateUI();
    }
  }

  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];

    if(hit(player,e)){
      enemies.splice(i,1);
      boom(e.x,e.y,e.type!=="normal");
      if(!invincible){
        life--;
        shake=12;
        updateUI();
        if(life<=0)gameOver();
      }
      continue;
    }

    if(e.y>H+50){
      enemies.splice(i,1);
      life--;
      updateUI();
      if(life<=0)gameOver();
      continue;
    }

    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];

      if(hit(b,e)){
        bullets.splice(j,1);
        e.hp--;

        if(e.hp>0){
          shake=3;
          continue;
        }

        enemies.splice(i,1);
        boom(e.x,e.y,e.type!=="normal");
        shake=e.type==="normal"?5:14;

        if(e.type==="split"){
          splitEnemy(e);
          score+=15;
        }else if(e.type==="midboss"){
          score+=50;
          dropItem(e.x,e.y,"shot2");
          bgIndex=(bgIndex+1)%BG_NAMES.length;
        }else if(e.type==="boss"){
          score+=120;
          dropItem(e.x-18,e.y,"shot3");
          if(Math.random()<.6)dropItem(e.x+18,e.y,"invincible");
          life=Math.min(life+1,5);
          bgIndex=(bgIndex+1)%BG_NAMES.length;
        }else{
          score+=10;
        }

        updateUI();
        break;
      }
    }
  }
}

function drawBackground(){
  const t=Date.now();
  const bg=ctx.createLinearGradient(0,0,0,H);

  if(bgIndex===1){
    bg.addColorStop(0,"#111827");bg.addColorStop(.6,"#374151");bg.addColorStop(1,"#0f172a");
  }else if(bgIndex===2){
    bg.addColorStop(0,"#38bdf8");bg.addColorStop(.55,"#7dd3fc");bg.addColorStop(1,"#dcfce7");
  }else if(bgIndex===3){
    bg.addColorStop(0,"#fbbf24");bg.addColorStop(.58,"#fb923c");bg.addColorStop(1,"#7c2d12");
  }else{
    bg.addColorStop(0,"#070421");bg.addColorStop(.45,"#061329");bg.addColorStop(1,"#020617");
  }

  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);

  if(bgIndex<2){
    stars.forEach(s=>{
      const y=(s.y+t/28*s.s)%H;
      ctx.fillStyle="#e0f2fe";
      ctx.globalAlpha=.75;
      ctx.fillRect(s.x,y,s.r,s.r);
    });
    ctx.globalAlpha=1;
  }

  if(bgIndex===2){
    ctx.fillStyle="rgba(255,255,255,.7)";
    for(let i=0;i<5;i++){
      const x=(i*180+t/70)%(W+220)-110;
      const y=H*.16+i%3*52;
      ctx.beginPath();
      ctx.arc(x,y,24,0,Math.PI*2);
      ctx.arc(x+28,y+4,30,0,Math.PI*2);
      ctx.arc(x+62,y,21,0,Math.PI*2);
      ctx.fill();
    }
  }

  if(bgIndex===3){
    ctx.fillStyle="rgba(254,243,199,.7)";
    ctx.beginPath();
    ctx.arc(W*.82,H*.18,28,0,Math.PI*2);
    ctx.fill();
  }

  ctx.fillStyle="rgba(15,23,42,.45)";
  ctx.fillRect(8,34,124,22);
  ctx.fillStyle="#e0f2fe";
  ctx.font="13px sans-serif";
  ctx.fillText("BG: "+BG_NAMES[bgIndex],16,50);
}

function drawPlayer(){
  const invincible=performance.now()<invincibleUntil;
  if(invincible&&Math.floor(performance.now()/90)%2===0)ctx.globalAlpha=.45;

  ctx.shadowBlur=invincible?28:18;
  ctx.shadowColor=invincible?"#facc15":"#38bdf8";

  const g=ctx.createLinearGradient(player.x,player.y-34,player.x,player.y+38);
  g.addColorStop(0,"#eff6ff");g.addColorStop(.45,"#38bdf8");g.addColorStop(1,"#1d4ed8");
  ctx.fillStyle=g;

  ctx.beginPath();
  ctx.moveTo(player.x,player.y-34);
  ctx.lineTo(player.x+12,player.y+4);
  ctx.lineTo(player.x+33,player.y+23);
  ctx.lineTo(player.x+10,player.y+19);
  ctx.lineTo(player.x+4,player.y+32);
  ctx.lineTo(player.x,player.y+23);
  ctx.lineTo(player.x-4,player.y+32);
  ctx.lineTo(player.x-10,player.y+19);
  ctx.lineTo(player.x-33,player.y+23);
  ctx.lineTo(player.x-12,player.y+4);
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur=0;
  ctx.globalAlpha=1;

  ctx.fillStyle="#e0f2fe";
  ctx.beginPath();
  ctx.ellipse(player.x,player.y-11,6,13,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#facc15";
  ctx.beginPath();
  ctx.moveTo(player.x,player.y+43);
  ctx.lineTo(player.x+8,player.y+24);
  ctx.lineTo(player.x-8,player.y+24);
  ctx.closePath();
  ctx.fill();

  if(invincible){
    ctx.strokeStyle="#facc15";
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(player.x,player.y,42,0,Math.PI*2);
    ctx.stroke();
  }
}

function drawEnemy(e){
  if(e.type==="boss"){
    if(e.stage===0)drawBossSpace(e);
    else if(e.stage===1)drawBossMoon(e);
    else if(e.stage===2)drawBossSky(e);
    else drawBossDesert(e);
    drawHp(e);
    return;
  }

  if(e.type==="midboss"){
    drawMidBoss(e);
    drawHp(e);
    return;
  }

  if(e.type==="curve")ctx.fillStyle="#f97316";
  else if(e.type==="split")ctx.fillStyle="#22c55e";
  else if(e.type==="follow")ctx.fillStyle="#a855f7";
  else ctx.fillStyle="#ef4444";

  ctx.shadowBlur=8;
  ctx.shadowColor=ctx.fillStyle;
  ctx.beginPath();
  ctx.ellipse(e.x,e.y,18,13,0,0,Math.PI*2);
  ctx.fill();
  ctx.fillRect(e.x-26,e.y-4,52,8);
  ctx.shadowBlur=0;

  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.arc(e.x-6,e.y-3,2.5,0,Math.PI*2);
  ctx.arc(e.x+6,e.y-3,2.5,0,Math.PI*2);
  ctx.fill();
}

function drawMidBoss(e){
  ctx.shadowBlur=18;
  ctx.shadowColor="#86efac";
  ctx.fillStyle="#22c55e";
  ctx.beginPath();
  ctx.arc(e.x,e.y,30,0,Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;

  ctx.strokeStyle="#166534";
  ctx.lineWidth=4;
  for(let i=0;i<12;i++){
    const a=i*Math.PI/6;
    ctx.beginPath();
    ctx.moveTo(e.x+Math.cos(a)*20,e.y+Math.sin(a)*20);
    ctx.lineTo(e.x+Math.cos(a)*43,e.y+Math.sin(a)*43);
    ctx.stroke();
  }
}

function drawBossSpace(e){
  ctx.shadowBlur=25;ctx.shadowColor="#a78bfa";
  ctx.fillStyle="#7c3aed";
  ctx.fillRect(e.x-42,e.y-30,84,60);
  ctx.fillRect(e.x-74,e.y-10,32,22);
  ctx.fillRect(e.x+42,e.y-10,32,22);
  ctx.shadowBlur=0;
  ctx.fillStyle="#facc15";
  ctx.beginPath();ctx.arc(e.x,e.y,9,0,Math.PI*2);ctx.fill();
}

function drawBossMoon(e){
  ctx.fillStyle="#d1d5db";
  ctx.beginPath();ctx.arc(e.x,e.y,38,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#111827";
  ctx.beginPath();ctx.arc(e.x-12,e.y-6,7,0,Math.PI*2);ctx.arc(e.x+12,e.y-6,7,0,Math.PI*2);ctx.fill();
  ctx.fillRect(e.x-17,e.y+12,34,7);
}

function drawBossSky(e){
  ctx.fillStyle="#0ea5e9";
  ctx.beginPath();ctx.ellipse(e.x,e.y,35,25,0,0,Math.PI*2);ctx.fill();
  ctx.fillRect(e.x-67,e.y-7,134,14);
  ctx.fillStyle="#facc15";
  ctx.beginPath();ctx.arc(e.x,e.y,8,0,Math.PI*2);ctx.fill();
}

function drawBossDesert(e){
  ctx.fillStyle="#b45309";
  ctx.beginPath();ctx.arc(e.x,e.y,28,0,Math.PI*2);ctx.fill();
  ctx.fillRect(e.x-62,e.y-8,32,16);
  ctx.fillRect(e.x+30,e.y-8,32,16);
  ctx.strokeStyle="#7c2d12";
  ctx.lineWidth=7;
  ctx.beginPath();
  ctx.moveTo(e.x,e.y-22);
  ctx.lineTo(e.x+17,e.y-48);
  ctx.lineTo(e.x-8,e.y-68);
  ctx.stroke();
}

function drawHp(e){
  ctx.fillStyle="#fff7ed";
  const width=e.maxHp*6;
  for(let i=0;i<e.hp;i++){
    ctx.fillRect(e.x-width/2+i*6,e.y+e.h*.33,4,5);
  }
}

function drawItem(it){
  ctx.save();
  ctx.translate(it.x,it.y);
  ctx.rotate(Date.now()/220);
  ctx.shadowBlur=18;
  ctx.shadowColor=it.type==="invincible"?"#facc15":"#60a5fa";
  ctx.fillStyle=it.type==="invincible"?"#facc15":it.type==="shot3"?"#a78bfa":"#38bdf8";
  ctx.beginPath();
  ctx.moveTo(0,-14);
  ctx.lineTo(12,0);
  ctx.lineTo(0,14);
  ctx.lineTo(-12,0);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle="#020617";
  ctx.font="bold 12px sans-serif";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText(it.type==="invincible"?"★":it.type==="shot3"?"3":"2",0,1);
  ctx.restore();
}

function drawBossHP(){
  const boss=enemies.find(e=>e.type==="boss");
  if(!boss)return;

  const barWidth=W*.62,barHeight=12,x=(W-barWidth)/2,y=64;

  ctx.fillStyle="rgba(15,23,42,.75)";
  ctx.fillRect(x,y,barWidth,barHeight);

  ctx.fillStyle="#ef4444";
  ctx.fillRect(x,y,barWidth*(boss.hp/boss.maxHp),barHeight);

  ctx.strokeStyle="#fff";
  ctx.strokeRect(x,y,barWidth,barHeight);
}

function draw(){
  ctx.clearRect(0,0,W,H);

  ctx.save();
  if(shake>0){
    ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
    shake*=.86;
    if(shake<.5)shake=0;
  }

  drawBackground();

  bullets.forEach(b=>{
    ctx.shadowBlur=10;
    ctx.shadowColor="#fde047";
    ctx.fillStyle="#fde047";
    ctx.fillRect(b.x-2,b.y-8,4,16);
    ctx.shadowBlur=0;
  });

  enemyBullets.forEach(b=>{
    ctx.shadowBlur=10;
    ctx.shadowColor="#ef4444";
    ctx.fillStyle="#ef4444";
    ctx.fillRect(b.x-4,b.y-7,8,14);
    ctx.shadowBlur=0;
  });

  items.forEach(drawItem);
  enemies.forEach(drawEnemy);

  booms.forEach(p=>{
    ctx.globalAlpha=p.life/34;
    ctx.fillStyle=Math.random()>.5?"#facc15":"#fb923c";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  });

  if(state==="play")drawPlayer();
  drawBossHP();

  ctx.restore();
}

function loop(t){
  update(t);
  draw();
  requestAnimationFrame(loop);
}

function handleTouch(e){
  e.preventDefault();
  const touch=e.touches[0];

  if(state!=="play"){
    startGame();
  }

  movePlayer(touch.clientX,touch.clientY);
}

canvas.addEventListener("touchstart",handleTouch,{passive:false});
canvas.addEventListener("touchmove",handleTouch,{passive:false});

canvas.addEventListener("mousedown",e=>{
  if(state!=="play")startGame();
  movePlayer(e.clientX,e.clientY);
});

canvas.addEventListener("mousemove",e=>{
  if(e.buttons===1)movePlayer(e.clientX,e.clientY);
});

title.addEventListener("touchstart",e=>{
  e.preventDefault();
  startGame();
},{passive:false});

title.addEventListener("click",startGame);

resetVars();
state="ready";
loop();
</script>
</body>
</html>
