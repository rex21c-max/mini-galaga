<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mini Galaxia</title>

<style>
html,body{margin:0;padding:0;overflow:hidden;background:#050814;touch-action:none;}
canvas{display:block;background:#020617;}
#ui{position:fixed;top:10px;left:10px;color:#e0f2fe;font:16px sans-serif;text-shadow:0 0 8px #38bdf8;z-index:2}
#msg{position:fixed;top:35%;left:0;right:0;text-align:center;color:white;font:28px sans-serif;text-shadow:0 0 16px #60a5fa;z-index:3}
#warning{position:fixed;top:30%;left:0;right:0;text-align:center;color:#facc15;font:42px sans-serif;font-weight:bold;text-shadow:0 0 18px #ef4444;z-index:4;display:none}
</style>
</head>

<body>
<div id="ui">
Score: <span id="score">0</span> /
Life: <span id="life">3</span> /
Shot: <span id="shot">1</span>
</div>

<div id="warning">WARNING</div>
<div id="msg">MINI GALAXIA<br><small>Touch to start</small></div>

<canvas id="game"></canvas>

<script>
// ===== 기본 =====
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let W,H;
let player, bullets=[], enemies=[], enemyBullets=[], items=[];
let score=0, life=3, shotLevel=1;
let state="ready";

let enemySpeed=0.7;
let startTime, elapsed;
let nextBoss=30000, bossCount=0;

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

// ===== 시작 =====
function start(){
  if(state!=="play"){
    player={x:W/2,y:H-80};
    bullets=[]; enemies=[]; enemyBullets=[]; items=[];
    score=0; life=3; shotLevel=1;
    startTime=performance.now();
    nextBoss=30000;
    bossCount=0;
    state="play";
    document.getElementById("msg").style.display="none";
  }
}

// ===== 플레이어 =====
function drawPlayer(){
  ctx.fillStyle="#38bdf8";
  ctx.beginPath();
  ctx.moveTo(player.x,player.y-30);
  ctx.lineTo(player.x+15,player.y+20);
  ctx.lineTo(player.x-15,player.y+20);
  ctx.closePath();
  ctx.fill();
}

// ===== 총알 =====
function shoot(){
  if(shotLevel===1){
    bullets.push({x:player.x,y:player.y-30});
  }
  else if(shotLevel===2){
    bullets.push({x:player.x-10,y:player.y-30});
    bullets.push({x:player.x+10,y:player.y-30});
  }
  else{
    bullets.push({x:player.x,y:player.y-30});
    bullets.push({x:player.x-15,y:player.y-30});
    bullets.push({x:player.x+15,y:player.y-30});
  }
}

// ===== 보스 생성 =====
function spawnBoss(){
  bossCount++;

  enemies.push({
    x:W/2,
    y:-60,
    type:"boss",
    hp: bossCount%2 ? 3 : 8,
    stage: bossCount%4,
    vx:1.2
  });

  document.getElementById("warning").style.display="block";
  setTimeout(()=>document.getElementById("warning").style.display="none",1000);
}

// ===== 보스 공격 =====
function bossShoot(e){
  if(e.stage===0){
    enemyBullets.push({x:e.x,y:e.y,vx:0,vy:4});
  }
  if(e.stage===1){
    for(let i=-2;i<=2;i++){
      enemyBullets.push({x:e.x,y:e.y,vx:i,vy:3});
    }
  }
  if(e.stage===2){
    enemyBullets.push({x:e.x,y:e.y,vx:0,vy:6});
  }
  if(e.stage===3){
    enemyBullets.push({x:e.x,y:e.y,vx:1,vy:3,curve:0.05});
  }
}

// ===== 충돌 =====
function hit(a,b){
  return Math.abs(a.x-b.x)<20 && Math.abs(a.y-b.y)<20;
}

// ===== 업데이트 =====
function update(t){
  if(state!=="play")return;

  elapsed=t-startTime;

  // 보스 등장
  if(elapsed>nextBoss){
    spawnBoss();
    nextBoss+=30000;
  }

  // 총알 이동
  bullets.forEach(b=>b.y-=6);

  // 적 이동
  enemies.forEach(e=>{
    if(e.type==="boss"){
      e.y+=1;
      e.x+=e.vx;
      if(e.x<50||e.x>W-50)e.vx*=-1;
      if(Math.random()<0.02)bossShoot(e);
    }
  });

  // 적 총알
  enemyBullets.forEach(b=>{
    b.x+=b.vx;
    if(b.curve)b.vx+=b.curve;
    b.y+=b.vy;
  });

  // 충돌
  enemies.forEach((e,i)=>{
    bullets.forEach((b,j)=>{
      if(hit(b,e)){
        bullets.splice(j,1);
        e.hp--;
        if(e.hp<=0){
          enemies.splice(i,1);
          score+=10;

          // 아이템 드랍
          if(e.type==="boss"){
            if(e.hp===3) items.push({x:e.x,y:e.y,type:"shot2"});
            else items.push({x:e.x,y:e.y,type:"shot3"});
          }
        }
      }
    });
  });

  // 아이템 획득
  items.forEach((it,i)=>{
    if(hit(player,it)){
      if(it.type==="shot2") shotLevel=2;
      if(it.type==="shot3") shotLevel=3;
      items.splice(i,1);
    }
  });
}

// ===== 그리기 =====
function draw(){
  ctx.clearRect(0,0,W,H);

  drawPlayer();

  bullets.forEach(b=>{
    ctx.fillStyle="yellow";
    ctx.fillRect(b.x-2,b.y-10,4,10);
  });

  enemies.forEach(e=>{
    ctx.fillStyle=e.type==="boss"?"purple":"red";
    ctx.fillRect(e.x-20,e.y-20,40,40);
  });

  enemyBullets.forEach(b=>{
    ctx.fillStyle="orange";
    ctx.fillRect(b.x-3,b.y-8,6,8);
  });

  items.forEach(it=>{
    ctx.fillStyle="cyan";
    ctx.fillRect(it.x-10,it.y-10,20,20);
  });
}

// ===== 루프 =====
function loop(t){
  update(t);
  draw();
  requestAnimationFrame(loop);
}
loop();

// ===== 입력 =====
canvas.addEventListener("touchstart",e=>{
  start();
  player.x=e.touches[0].clientX;
  player.y=e.touches[0].clientY;
  shoot();
});

canvas.addEventListener("touchmove",e=>{
  player.x=e.touches[0].clientX;
  player.y=e.touches[0].clientY;
});

</script>
</body>
</html>
