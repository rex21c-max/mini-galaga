<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mini Galaga v2</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#050814;touch-action:none;}
canvas{display:block;background:#020617;}
#ui{position:fixed;top:10px;left:10px;color:white;font:16px sans-serif;z-index:2}
#msg{position:fixed;top:38%;left:0;right:0;text-align:center;color:white;font:28px sans-serif;z-index:3}
#msg small{font-size:15px;opacity:.85}
</style>
</head>
<body>
<div id="ui">Score: <span id="score">0</span> / Life: <span id="life">3</span></div>
<div id="msg">MINI GALAGA v2<br><small>화면을 터치하면 시작</small></div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const scoreEl=document.getElementById("score");
const lifeEl=document.getElementById("life");
const msg=document.getElementById("msg");

let W,H,player,bullets,enemies,booms,score,life,state;
let lastShot=0,timer=0;

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

function reset(){
  player={x:W/2,y:H-80,w:38,h:48};
  bullets=[];
  enemies=[];
  booms=[];
  score=0;
  life=3;
  state="ready";
  updateUI();
  msg.innerHTML="MINI GALAGA v2<br><small>화면을 터치하면 시작</small>";
  msg.style.display="block";
}

function start(){
  if(state==="ready" || state==="over"){
    player={x:W/2,y:H-80,w:38,h:48};
    bullets=[];
    enemies=[];
    booms=[];
    score=0;
    life=3;
    state="play";
    msg.style.display="none";
    updateUI();
  }
}

function updateUI(){
  scoreEl.textContent=score;
  lifeEl.textContent=life;
}

function drawPlayer(){
  ctx.fillStyle="#60a5fa";
  ctx.beginPath();
  ctx.moveTo(player.x,player.y-25);
  ctx.lineTo(player.x+22,player.y+24);
  ctx.lineTo(player.x+6,player.y+12);
  ctx.lineTo(player.x,player.y+20);
  ctx.lineTo(player.x-6,player.y+12);
  ctx.lineTo(player.x-22,player.y+24);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle="#facc15";
  ctx.beginPath();
  ctx.moveTo(player.x,player.y+34);
  ctx.lineTo(player.x+8,player.y+20);
  ctx.lineTo(player.x-8,player.y+20);
  ctx.closePath();
  ctx.fill();
}

function drawEnemy(e){
  ctx.fillStyle="#fb7185";
  ctx.beginPath();
  ctx.moveTo(e.x,e.y+18);
  ctx.lineTo(e.x+22,e.y-18);
  ctx.lineTo(e.x+5,e.y-8);
  ctx.lineTo(e.x,e.y-14);
  ctx.lineTo(e.x-5,e.y-8);
  ctx.lineTo(e.x-22,e.y-18);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle="#fecdd3";
  ctx.fillRect(e.x-10,e.y-2,20,5);
}

function hit(a,b){
  return a.x-a.w/2<b.x+b.w/2 &&
         a.x+a.w/2>b.x-b.w/2 &&
         a.y-a.h/2<b.y+b.h/2 &&
         a.y+a.h/2>b.y-b.h/2;
}

function shoot(t){
  if(t-lastShot>210){
    bullets.push({x:player.x-9,y:player.y-35,w:5,h:15,s:9});
    bullets.push({x:player.x+9,y:player.y-35,w:5,h:15,s:9});
    lastShot=t;
  }
}

function spawn(){
  let level=Math.floor(score/100);
  enemies.push({
    x:30+Math.random()*(W-60),
    y:-30,
    w:42,
    h:36,
    s:2.2+Math.random()*2+level*0.25
  });
}

function boom(x,y){
  for(let i=0;i<10;i++){
    booms.push({
      x:x,
      y:y,
      vx:(Math.random()-.5)*5,
      vy:(Math.random()-.5)*5,
      r:2+Math.random()*3,
      life:22
    });
  }
}

function end(){
  state="over";
  msg.innerHTML="GAME OVER<br><small>Score: "+score+"<br>터치하면 다시 시작</small>";
  msg.style.display="block";
}

function update(t){
  if(state!=="play")return;

  shoot(t);

  timer++;
  let spawnGap=Math.max(16,35-Math.floor(score/80));
  if(timer>spawnGap){
    spawn();
    timer=0;
  }

  bullets.forEach(b=>b.y-=b.s);
  bullets=bullets.filter(b=>b.y>-20);

  enemies.forEach(e=>e.y+=e.s);

  booms.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
  });
  booms=booms.filter(p=>p.life>0);

  for(let i=enemies.length-1;i>=0;i--){
    let e=enemies[i];

    if(hit(player,e)){
      boom(e.x,e.y);
      enemies.splice(i,1);
      life--;
      updateUI();
      if(life<=0)end();
      continue;
    }

    if(e.y>H+40){
      enemies.splice(i,1);
      life--;
      updateUI();
      if(life<=0)end();
      continue;
    }

    for(let j=bullets.length-1;j>=0;j--){
      let b=bullets[j];
      if(hit(b,e)){
        bullets.splice(j,1);
        enemies.splice(i,1);
        boom(e.x,e.y);
        score+=10;
        updateUI();
        break;
      }
    }
  }
}

function drawStars(){
  ctx.fillStyle="white";
  for(let i=0;i<80;i++){
    let x=(i*97)%W;
    let y=(i*173+Date.now()/18)%H;
    ctx.fillRect(x,y,2,2);
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawStars();

  bullets.forEach(b=>{
    ctx.fillStyle="#fde047";
    ctx.fillRect(b.x-2,b.y-8,4,16);
  });

  enemies.forEach(drawEnemy);

  booms.forEach(p=>{
    ctx.globalAlpha=p.life/22;
    ctx.fillStyle="#facc15";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  });

  drawPlayer();
}

function loop(t){
  update(t);
  draw();
  requestAnimationFrame(loop);
}

function move(x){
  if(player) player.x=Math.max(25,Math.min(W-25,x));
}

canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  start();
  move(e.touches[0].clientX);
},{passive:false});

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  move(e.touches[0].clientX);
},{passive:false});

canvas.addEventListener("mousedown",e=>{
  start();
  move(e.clientX);
});

canvas.addEventListener("mousemove",e=>{
  if(e.buttons===1)move(e.clientX);
});

reset();
loop();
</script>
</body>
</html>
